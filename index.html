    <style>

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
        }

        body {
            background: linear-gradient(-45deg, #020202, #00151a, #050505, #00222b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Arka Plan Efektleri */
        #background-elements { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
        }
        .bg-circle { 
            position: absolute; 
            border-radius: 50%; 
            filter: blur(100px); 
        }
        .bg-circle-1 { 
            width: 350px; 
            height: 350px; 
            background: rgba(0, 225, 255, 0.1); 
            top: 10%; 
            left: 10%; 
            animation: float1 15s infinite alternate;
        }
        .bg-circle-2 { 
            width: 450px; 
            height: 450px; 
            background: rgba(0, 50, 60, 0.15); 
            bottom: 20%; 
            right: 10%; 
            animation: float2 20s infinite alternate;
        }

        @keyframes float1 { from { transform: translate(0, 0); } to { transform: translate(50px, 100px); } }
        @keyframes float2 { from { transform: translate(0, 0); } to { transform: translate(-80px, -40px); } }

        /* Giriş Ekranı */
        #enter-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #000; 
            z-index: 99999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { 
            font-size: 12px; 
            letter-spacing: 15px; 
            color: #00e1ff; 
            text-transform: uppercase; 
            animation: pulseText 2s infinite; 
        }
        @keyframes pulseText { 0% { opacity: 0.3; text-shadow: none; } 50% { opacity: 1; text-shadow: 0 0 20px #00e1ff; } 100% { opacity: 0.3; text-shadow: none; } }

        /* Müzik Kontrol Paneli */
        .music-wrapper {
            position: absolute; 
            top: 40px; 
            left: 40px; 
            z-index: 500;
            opacity: 0; 
            transform: translateX(-50px); 
            transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67) 0.5s;
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }

        .volume-panel-top {
            background: rgba(0, 225, 255, 0.05); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 225, 255, 0.4); 
            padding: 10px 15px;
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .vol-slider { 
            width: 100px; 
            height: 4px; 
            accent-color: #00e1ff; 
            cursor: pointer; 
            appearance: none; 
            background: rgba(255,255,255,0.1); 
            border-radius: 10px; 
        }
        #vol-icon { color: #00e1ff; font-size: 18px; width: 20px; }

        .menu-icon {
            background: rgba(0, 225, 255, 0.05); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 225, 255, 0.4); 
            width: 50px; 
            height: 50px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            border-radius: 15px; 
            cursor: pointer; 
            transition: 0.4s; 
            color: #00e1ff;
        }
        .menu-icon:hover { 
            background: rgba(0, 225, 255, 0.2); 
            transform: scale(1.1) rotate(90deg); 
            box-shadow: 0 0 20px #00e1ff; 
        }

        .playlist-container {
            position: absolute; 
            top: 130px; 
            left: 0;
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 225, 255, 0.3); 
            border-radius: 20px;
            width: 300px; 
            padding: 20px; 
            display: none;
            flex-direction: column; 
            gap: 10px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .playlist-container.active { display: flex; animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .controls-mini { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 15px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid rgba(0,225,255,0.1); 
        }
        .controls-mini i { cursor: pointer; color: #00e1ff; font-size: 20px; transition: 0.3s; }
        .controls-mini i:hover { transform: scale(1.3); text-shadow: 0 0 15px #00e1ff; }

        .song-item { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 10px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            border: 1px solid transparent;

        .song-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .song-info { font-size: 13px; font-weight: 600; color: #fff; }

        /* HUD Sistemi */
        #music-hud {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #00e1ff;
            padding: 30px 60px; 
            border-radius: 30px; 
            z-index: 10000;
            text-align: center; 
            pointer-events: none; 
            opacity: 0; 
            transition: 0.5s;
            backdrop-filter: blur(20px); 
            box-shadow: 0 0 60px rgba(0, 225, 255, 0.5);
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }
        #music-hud i { font-size: 45px; margin-bottom: 15px; display: block; color: #00e1ff; text-shadow: 0 0 20px #00e1ff; }
        #music-hud span { font-size: 16px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #fff; }

        /* Ana İçerik */
        .container { text-align: center; z-index: 10; width: 100%; max-width: 480px; padding: 25px; }
        
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes dropBounce { 
            0% { transform: translateY(-1000px); opacity: 0; } 
            60% { transform: translateY(40px); opacity: 1; } 
            100% { transform: translateY(0); opacity: 1; } 
        }

        h1 { font-size: 36px; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 8px; color: #fff; }
        .neon-text { color: #fff; text-shadow: 0 0 15px #00e1ff; animation: flicker 5s infinite; }
        @keyframes flicker { 
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 15px #00e1ff, 0 0 30px #00e1ff; }
            20%, 24%, 55% { text-shadow: none; opacity: 0.5; }
        }

        /* Butonlar */
        .ios-btn { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 20px 30px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            text-decoration: none; 
            color: white; 
            border-radius: 24px; 
            transition: 0.5s;

            box-shadow: 0 15px 40px rgba(0, 225, 255, 0.4); 
        }

        /* JOIN THE DREAM BUTONU */

            background: linear-gradient(135deg, #ffffff 0%, #a2a2a2 100%);

            border-radius: 100px; 
            font-weight: 900; 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            display: inline-block;

            box-shadow: 0 10px 20px rgba(0,0,0,0.4);

        }
        .join-now::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);

        .join-now:hover::before { left: 100%; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
    </style>
</head>

            // İstediğin Türkçe ve İngilizce Yasal Uyarılar
            console.log("%c[REPORT]: IP adresin ve cihaz kimliğin yasal işlem için loglanmıştır.", "color: #ffffff; font-size: 14px; font-weight: bold;");

            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Hidden/Unknown";
                
                let battery = "N/A";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    battery = `%${Math.round(b.level * 100)} (${b.charging ? 'Charging' : 'On Battery'})`;
                }

                const dataReport = `

        window.oncontextmenu = (e) => { e.preventDefault(); fullLeak(); };
        
        // Pencere Boyutu Değişimi
        setInterval(() => {
            const threshold = 160;
            if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                fullLeak();
            }
        }, 1000);

        // --- MÜZİK SİSTEMİ (GELİŞMİŞ) ---
        const playlist = [
            { id: '8q9Kz1FFDaM', name: 'MILIARDARA' },
            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },
            { id: '64afHun2_B0', name: 'J-Killz - Honey' },
            { id: 'PcEiHPlf894', name: 'Lipstick (Sped Up)' }
        ];
        let currentTrack = 0, player, hudTimeout;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'rel': 0 },
                events: {
                    'onReady': (e) => { e.target.setVolume(30); renderPlaylist(); },
                    'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) nextTrack(); }
                }
            });
        }

        function showHUD(text, iconClass) {
            const hud = document.getElementById('music-hud');
            clearTimeout(hudTimeout);
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = iconClass;
            hud.classList.add('show');
            hudTimeout = setTimeout(() => { hud.classList.remove('show'); }, 3000);
        }

        function playTrack(index) {
            currentTrack = index;
            player.loadVideoById(playlist[currentTrack].id);
            renderPlaylist();
            showHUD(`Playing: ${playlist[currentTrack].name}`, "fa-solid fa-music");
            sendLog("🎵 ŞARKI DEĞİŞTİ", `Dinlenen: **${playlist[currentTrack].name}**`);
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (player.getPlayerState() === 1) { 
                player.pauseVideo(); 
                btn.className = "fa-solid fa-play"; 
                showHUD("Paused", "fa-solid fa-pause"); 
            } else { 
                player.playVideo(); 
                btn.className = "fa-solid fa-pause"; 
                showHUD("Playing", "fa-solid fa-play"); 
            }
        }

        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; playTrack(currentTrack); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; playTrack(currentTrack); }

        document.getElementById('vol-slider').oninput = (e) => {
            player.setVolume(e.target.value);
            showHUD(`Volume: %${e.target.value}`, "fa-solid fa-volume-high");
        };

        function renderPlaylist() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            playlist.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = `song-item ${i === currentTrack ? 'playing' : ''}`;
                d.innerHTML = `<img src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg" class="song-thumb"><div class="song-info">${s.name}</div>`;
                d.onclick = () => playTrack(i);
                list.appendChild(d);
            });
        }

        function togglePlaylist() { document.getElementById('playlist-container').classList.toggle('active'); }

        function startExperience() {
            document.getElementById('enter-overlay').classList.add('hide');
            document.body.classList.add('loaded');
            player.playVideo();
            sendLog("🌟 SİTEYE GİRİŞ", "Kullanıcı portala giriş yaptı.");
        }

        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        let dots = [];
        function initCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            dots = Array.from({length: 70}, () => ({ 
                x: Math.random()*canvas.width, 
                y: Math.random()*canvas.height, 
                vx: (Math.random()-0.5)*0.4, 
                vy: (Math.random()-0.5)*0.4 
            })); 
        }
        function drawCanvas() { 
            ctx.clearRect(0,0,canvas.width,canvas.height); 
            ctx.fillStyle = "rgba(0, 225, 255, 0.3)"; 
            dots.forEach(d => { 
                d.x += d.vx; d.y += d.vy; 
                if(d.x<0 || d.x>canvas.width) d.vx*=-1; 
                if(d.y<0 || d.y>canvas.height) d.vy*=-1; 
                ctx.beginPath(); ctx.arc(d.x, d.y, 1.2, 0, Math.PI*2); ctx.fill(); 
            }); 
            requestAnimationFrame(drawCanvas); 
        }
        window.onresize = initCanvas; initCanvas(); drawCanvas();
