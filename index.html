<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
       
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* ==================== GİRİŞ EKRANI ==================== */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex;
            justify-content: center; align-items: center; 
            transition: opacity 0.8s ease;
            cursor: pointer;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }

        #enter-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.85;
        }

        #enter-text {
            position: relative;
            z-index: 2;
            font-size: 13px;
            letter-spacing: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s;
        }

        #enter-overlay.ready #enter-text {
            opacity: 1;
        }

        /* Aşağıdaki stil kısmı tamamen aynı (müzik paneli, hud vs.) */
        .music-wrapper { position: absolute; top: 30px; left: 30px; z-index: 500; opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s; display: flex; flex-direction: column; gap: 10px; }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }
        .volume-panel-top { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1.5px solid #fff; padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; width: fit-content; }
        .vol-slider { width: 80px; height: 3px; accent-color: #fff; cursor: pointer; appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; }
        #vol-icon { cursor: pointer; transition: 0.2s; width: 15px; text-align: center; }
        #vol-icon:hover { transform: scale(1.2); }
        .menu-icon { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1.5px solid #fff; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .menu-icon:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .playlist-container { position: absolute; top: 115px; left: 0; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1.5px solid #fff; border-radius: 18px; width: 280px; padding: 15px; display: none; flex-direction: column; gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .playlist-container.active { display: flex; animation: fadeIn 0.3s ease; }
        .controls-mini { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .controls-mini i { cursor: pointer; opacity: 0.8; font-size: 16px; transition: 0.2s; }
        .controls-mini i:hover { opacity: 1; transform: scale(1.2); }
        .song-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .song-item:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .song-item.playing { background: rgba(255,255,255,0.15); border-color: #fff; }
        .song-thumb { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
        .song-info { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

        #music-hud { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.05); border: 1.5px solid #fff; padding: 25px 45px; border-radius: 24px; z-index: 1000; text-align: center; pointer-events: none; opacity: 0; transition: 0.4s; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }
        #music-hud i { font-size: 38px; margin-bottom: 12px; display: block; }
        #music-hud span { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        #music-hud.ad-active { border-color: #ff9800; }

        .static-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 50%), radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent 50%); z-index: -1; }
        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; padding: 20px; }
        h1 { font-size: 30px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; color: #fff; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .neon-text { text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4); }
        .ios-btn, .join-now { /* aynı kalıyor */ }
        #video-container { position: absolute; left: -9999px; }
    </style>
</head>

            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },

            { id: 'PcEiHPlf894', name: 'Lipstick (Sped Up)' },
            { id: 'vTG4AvEnFLA', name: 'Desolate' }

        let currentTrack = 0;

                height: '1', width: '1', videoId: playlist[currentTrack].id,

        }

        // Playlist ve müzik fonksiyonları (kısaltılmış)
        function renderPlaylist() { /* aynı */ const list = document.getElementById('song-list'); list.innerHTML = ''; /* ... */ }
        function playSong(i) { currentTrack = i; player.loadVideoById(playlist[i].id); showHUD(playlist[i].name, "fa-solid fa-music"); renderPlaylist(); }
        function togglePlaylist() { document.getElementById('playlist-container').classList.toggle('active'); }
        function showHUD(text, icon) { /* aynı */ }

        function toggleMute() { /* aynı */ }
        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; playSong(currentTrack); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; playSong(currentTrack); }

        // ====================== DÜZELTİLMİŞ ENTER ANIMASYONU ======================
        let enterCanvas, enterCtx, particles = [], animationComplete = false, canClick = false;

        function initEnterAnimation() {
            enterCanvas = document.getElementById('enter-canvas');
            enterCtx = enterCanvas.getContext('2d');
            enterCanvas.width = window.innerWidth;
            enterCanvas.height = window.innerHeight;

            const text = "CLICK TO ENTER";
            enterCtx.font = "bold 52px Poppins";
            const textWidth = enterCtx.measureText(text).width;
            const startX = (enterCanvas.width - textWidth) / 2;

            const textPoints = [];
            for (let i = 0; i < text.length; i++) {
                const charX = startX + i * 38;
                for (let x = 0; x < 28; x++) {
                    for (let y = 0; y < 48; y++) {
                        if (Math.random() > 0.68) {
                            textPoints.push({ x: charX + x*1.9, y: enterCanvas.height * 0.48 + y*1.45 });
                        }
                    }
                }
            }

            particles = [];
            for (let i = 0; i < 1200; i++) {   // Sayı azaltıldı
                const target = textPoints[Math.floor(Math.random() * textPoints.length)];
                particles.push({
                    x: Math.random() * enterCanvas.width,
                    y: Math.random() * enterCanvas.height * 0.8,
                    targetX: target.x,
                    targetY: target.y,
                    size: Math.random() * 1.8 + 0.8,
                    speed: Math.random() * 0.028 + 0.014   // Daha yavaş
                });
            }

            drawEnterAnimation();
        }

        function drawEnterAnimation() {
            enterCtx.clearRect(0, 0, enterCanvas.width, enterCanvas.height);
            let completed = 0;

            particles.forEach(p => {
                const dx = p.targetX - p.x;
                const dy = p.targetY - p.y;
                const dist = Math.hypot(dx, dy);

                if (dist > 5) {
                    p.x += dx * p.speed;
                    p.y += dy * p.speed;
                } else completed++;

                enterCtx.fillStyle = "rgba(255,255,255,0.9)";
                enterCtx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            });

            if (completed > particles.length * 0.88 && !animationComplete) {
                animationComplete = true;
                document.getElementById('enter-overlay').classList.add('ready');
                canClick = true;
            }

            if (!animationComplete) requestAnimationFrame(drawEnterAnimation);
        }

        function startExperience() {
            if (!canClick) return;
            document.getElementById('enter-overlay').classList.add('hide');
            document.body.classList.add('loaded');
            if (player) player.playVideo();
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
        }

        // Arka plan canvas (değişmedi)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function drawBg() { /* aynı kod */ }

        window.addEventListener('resize', () => {
            initBgCanvas();
            initEnterAnimation();
        });

        window.onload = () => {
            initEnterAnimation();
            initBgCanvas();
            drawBg();
        };
    </script>
