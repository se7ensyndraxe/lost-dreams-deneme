<!-- FULL UI UPGRADE: advanced animations, parallax, glow, premium feel -->
<style>
:root {
    --primary: #00e1ff;
    --accent: #ff2bd6;
    --bg-dark: #05070d;
}

body {
    margin:0;
    background: radial-gradient(circle at 30% 30%, #0a1f2f, transparent),
                radial-gradient(circle at 70% 70%, #1a0030, transparent),
                #000;
    overflow: hidden;
}

/* ==== DYNAMIC BACKGROUND (WEBGL-LIKE EFFECT) ==== */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background: linear-gradient(120deg, #00e1ff33, #ff00aa22, #00ffcc22);
    filter: blur(140px);
    animation: moveBg 18s infinite alternate ease-in-out;
}

@keyframes moveBg {
    0% { transform: translate(-10%, -10%) scale(1); }
    100% { transform: translate(10%, 10%) scale(1.4); }
}

/* ==== PARALLAX EFFECT ==== */
.container {
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
}

body:hover .container {
    transform: perspective(1200px) rotateX(6deg) rotateY(-6deg);
}

/* ==== GLASS CARD ==== */
.container {
    backdrop-filter: blur(40px);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    box-shadow: 0 0 100px rgba(0,0,0,0.8);
    padding: 60px 40px;
}

/* ==== TITLE PREMIUM ==== */
h1 {
    font-size: 36px;
    letter-spacing: 10px;
    background: linear-gradient(90deg, #fff, var(--primary), #fff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 5s linear infinite;
}

@keyframes shine {
    from { background-position: 0%; }
    to { background-position: 200%; }
}

/* ==== BUTTONS ULTRA ==== */
.ios-btn {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.4s;
}

.ios-btn::before {
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(120deg, transparent, var(--primary), transparent);
    opacity:0;
    transition:0.4s;
}

.ios-btn:hover::before {
    opacity:0.2;
}

.ios-btn:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 0 30px var(--primary), 0 0 80px rgba(0,0,0,0.8);
}

/* ==== LIQUID GLOW ==== */
.ios-btn::after {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, var(--primary), transparent 70%);
    opacity:0;
    transition:0.5s;
}

.ios-btn:hover::after {
    opacity:0.1;
    transform: translate(-25%, -25%);
}

/* ==== ICON ==== */
.btn-icon-wrap {
    background: radial-gradient(circle, var(--primary), transparent);
    box-shadow: 0 0 20px var(--primary);
}

/* ==== JOIN BUTTON FUTURE ==== */
.join-now {
    position: relative;
    border: none;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    color: black;
    font-weight: bold;
    overflow: hidden;
}

.join-now::before {
    content:"";
    position:absolute;
    inset:2px;
    background:black;
    border-radius:100px;
    z-index:-1;
}

.join-now:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px var(--primary);
}

/* ==== ENTER SCREEN UPGRADE ==== */
#enter-overlay {
    background: radial-gradient(circle at center, #000 0%, #02040a 100%);
}

.enter-logo-ring {
    border:2px solid var(--primary);
    box-shadow:0 0 60px var(--primary);
}

.enter-star {
    color:var(--accent);
    animation: spinGlow 8s linear infinite;
}

@keyframes spinGlow {
    from { transform: rotate(0deg); filter: drop-shadow(0 0 5px var(--accent)); }
    to { transform: rotate(360deg); filter: drop-shadow(0 0 25px var(--accent)); }
}

/* ==== PARTICLE SMOOTH ==== */
canvas {
    filter: blur(0.4px) contrast(120%);
}

/* ==== SMOOTH ENTRY ==== */
body.loaded * {
    animation: fadeUp .9s ease forwards;
}

@keyframes fadeUp {
    from { opacity:0; transform: translateY(30px); }
    to { opacity:1; transform: translateY(0); }
}

</style>

<script>
/* PARALLAX MOUSE TRACK */
document.addEventListener('mousemove', e => {
    const x = (window.innerWidth / 2 - e.clientX) / 25;
    const y = (window.innerHeight / 2 - e.clientY) / 25;
    document.querySelector('.container').style.transform =
        `perspective(1200px) rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>
