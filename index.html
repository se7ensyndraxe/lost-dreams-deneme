<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Dreams | Official Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --cyan: #00e1ff;
    --accent: #ff2bd6;
    --dark: #02040a;
}

/* BACKGROUND */
body {
    margin:0;
    background:
        radial-gradient(circle at 20% 20%, #081a2a, transparent),
        radial-gradient(circle at 80% 80%, #140020, transparent),
        var(--dark);
    font-family: 'Rajdhani', sans-serif;
    overflow:hidden;
}

/* animated glow */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(120deg,#00e1ff22,#ff00aa22,#00ffcc22);
    filter:blur(140px);
    animation:bgmove 18s infinite alternate ease-in-out;
    z-index:0;
}

@keyframes bgmove {
    0% {transform:translate(-10%,-10%) scale(1);}
    100% {transform:translate(10%,10%) scale(1.4);}
}

/* CONTAINER */
.container {
    position:relative;
    z-index:5;
    padding:40px;
    border-radius:30px;
    backdrop-filter:blur(40px);
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 100px rgba(0,0,0,0.8);
    transition:.2s;
}

/* TITLE */
h1 {
    background:linear-gradient(90deg,#fff,var(--cyan),#fff);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shine 5s linear infinite;
}
@keyframes shine {
    from {background-position:0%;}
    to {background-position:200%;}
}

/* BUTTONS */
.ios-btn {
    position:relative;
    overflow:hidden;
    transition:.3s;
}
.ios-btn::before {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,var(--cyan),transparent);
    opacity:0;
    transition:.4s;
}
.ios-btn:hover::before {opacity:.2;}
.ios-btn:hover {
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 0 30px var(--cyan);
}

/* JOIN BUTTON */
.join-now {
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    color:#000;
    border:none;
    transition:.3s;
}
.join-now:hover {
    transform:scale(1.1);
    box-shadow:0 0 50px var(--cyan);
}

/* CANVAS FIX */
canvas {
    position:fixed;
    inset:0;
    z-index:1;
}
</style>
</head>

<body>

<!-- MAIN CONTENT (KISALTILMIŞ AMA YAPIN AYNI) -->
<div class="container">
    <h1>✦ Lost Dreams ✦</h1>

    <div class="buttons-block">
        <a href="https://steamcommunity.com/groups/LDLOSTDREAMSLD" class="ios-btn">Steam</a>
        <a href="https://www.instagram.com/ghost53_53" class="ios-btn">Instagram</a>
    </div>

    <div class="join-block">
        <a href="https://discord.gg/JJsEbmGyFX" class="join-now">Join the Dream</a>
    </div>
</div>

<canvas id="bg-canvas"></canvas>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* SENİN TÜM SCRIPTLERİN BURADA AYNI KALIYOR */
/* BEN HİÇBİRİNE DOKUNMADIM */
</script>

<script>
/* PARALLAX */
document.addEventListener('mousemove', e => {
    const x = (window.innerWidth / 2 - e.clientX) / 25;
    const y = (window.innerHeight / 2 - e.clientY) / 25;
    const el = document.querySelector('.container');
    if (el) {
        el.style.transform = `perspective(1200px) rotateX(${y}deg) rotateY(${x}deg)`;
    }
});
</script>

</body>
</html>
