<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
       
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }
        /* Giriş Ekranı */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex;
            justify-content: center; align-items: center; cursor: default;
            transition: opacity 0.6s ease, visibility 0.6s;
            overflow: hidden;
        }
        #enter-overlay.ready { cursor: pointer; }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 {
            font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.18);
            text-transform: uppercase; opacity: 0; transition: opacity 0.45s ease, color 0.45s ease, text-shadow 0.45s ease;
            position: relative; z-index: 2;
        }
        #enter-overlay.ready h2 {
            opacity: 1;
            color: rgba(255, 255, 255, 0.55);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
            animation: neonLoader 2s infinite;
        }
        #enter-particle-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes neonLoader { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
        /* Müzik Paneli */
        .music-wrapper {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
            display: flex; flex-direction: column; gap: 10px;
        }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }
        .volume-panel-top {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1.5px solid #ffffff; padding: 8px 12px;
            border-radius: 12px; display: flex; align-items: center; gap: 10px;
            width: fit-content;
        }
        .vol-slider {
            width: 80px; height: 3px; accent-color: #fff; cursor: pointer;
            appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px;
        }
        .vol-slider::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; }
       
        #vol-icon { cursor: pointer; transition: 0.2s; width: 15px; text-align: center; }
        #vol-icon:hover { transform: scale(1.2); }
        .menu-icon {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1.5px solid #ffffff; width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .menu-icon:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        .playlist-container {
            position: absolute; top: 115px; left: 0;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1.5px solid #ffffff; border-radius: 18px;
            width: 280px; padding: 15px; display: none;
            flex-direction: column; gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .playlist-container.active { display: flex; animation: fadeIn 0.3s ease; }
        .controls-mini {
            display: flex; align-items: center; justify-content: center; gap: 25px;
            margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .controls-mini i { cursor: pointer; opacity: 0.8; font-size: 16px; transition: 0.2s; }
        .controls-mini i:hover { opacity: 1; transform: scale(1.2); }
        .song-item {
            display: flex; align-items: center; gap: 12px;
            padding: 8px; border-radius: 10px; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent;
        }
        .song-item:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); }
        .song-item.playing { background: rgba(255, 255, 255, 0.15); border-color: #fff; }
        .song-thumb { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
        .song-info { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        /* HUD (Merkezi Panel) */
        #music-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid #ffffff;
            padding: 25px 45px; border-radius: 24px; z-index: 1000;
            text-align: center; pointer-events: none; opacity: 0; transition: 0.4s;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }
        #music-hud i { font-size: 38px; margin-bottom: 12px; display: block; }
        #music-hud span { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        /* Reklam Durumu İçin Özel Renk (Opsiyonel) */
        #music-hud.ad-active { border-color: #ff9800; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        /* Canvas ve Görsel Tasarım */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.15), transparent 50%), radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.15), transparent 50%); z-index: -1; }
        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; padding: 20px; }
        @keyframes dropBounce { 0% { transform: translateY(-1000px); opacity: 0; } 60% { transform: translateY(30px); opacity: 1; } 80% { transform: translateY(-10px); } 100% { transform: translateY(0); opacity: 1; } }
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        h1 { font-size: 30px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; color: #fff; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .neon-text { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4); }
        .ios-btn { display: flex; align-items: center; justify-content: space-between; padding: 18px 25px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); text-decoration: none; color: white; border-radius: 20px; transition: 0.3s; margin-top: 15px; }
        .ios-btn:hover { background: rgba(255, 255, 255, 0.12); transform: scale(1.05); }
        .join-now { padding: 18px 60px; background: linear-gradient(90deg, #000, #fff); color: #000; text-decoration: none; border-radius: 100px; font-weight: 900; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; display: inline-block; transition: 0.3s; margin-top: 40px; }
        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">
    <div id="enter-overlay" onclick="startExperience()">
        <canvas id="enter-particle-canvas"></canvas>
        <h2 id="enter-text">CLICK TO ENTER</h2>
    </div>
    <div id="music-hud">
        <i id="hud-icon" class="fa-solid fa-music"></i>
        <span id="hud-text">Yükleniyor...</span>
    </div>
    <div class="music-wrapper">
        <div class="volume-panel-top">
            <i id="vol-icon" class="fa-solid fa-volume-high" onclick="toggleMute()"></i>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30">
        </div>
        <div class="menu-icon" onclick="togglePlaylist()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="playlist-container" id="playlist-container">
            <div class="controls-mini">
                <i class="fa-solid fa-backward-step" onclick="prevTrack()"></i>
                <i id="play-pause-btn" class="fa-solid fa-pause" onclick="togglePlay()"></i>
                <i class="fa-solid fa-forward-step" onclick="nextTrack()"></i>
            </div>
            <div id="song-list"></div>
        </div>
    </div>
    <div id="video-container"><div id="player"></div></div>
    <div class="static-bg"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <div class="anim-wrap delay-1">
            <h1>
                <div style="display:flex; align-items:center; gap:12px;"><span>✦</span><span class="neon-text">𝐋𝐎𝐒𝐓</span></div>
                <div style="display:flex; align-items:center; gap:12px;"><span class="neon-text">𝐃𝐑E𝐀𝐌𝐒</span><span>✦</span></div>
            </h1>
            <div style="font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px;">DESIGNED BY SE7ENSYNDRAXE</div>
        </div>
        <div class="anim-wrap delay-2">
            <a href="https://steamcommunity.com/groups/LDLOSTDREAMSLD" target="_blank" class="ios-btn">
                <div style="display:flex; align-items:center; gap:15px">
                    <div style="width:44px; height:44px; background:#1b2838; border-radius:12px; display:flex; align-items:center; justify-content:center"><i class="fa-brands fa-steam"></i></div>
                    <div><b>Steam Community</b></div>
                </div>
            </a>
            <a href="https://www.instagram.com/ghost53_53?igsh=MXhqbG0zNXplNDNvdg==" target="_blank" class="ios-btn">
                <div style="display:flex; align-items:center; gap:15px">
                    <div style="width:44px; height:44px; background:rgba(255,255,255,0.1); border-radius:12px; display:flex; align-items:center; justify-content:center"><i class="fa-brands fa-instagram"></i></div>
                    <div><b>Instagram</b></div>
                </div>
            </a>
        </div>
        <div class="anim-wrap delay-4">
            <a href="https://discord.gg/JJsEbmGyFX" target="_blank" class="join-now">JOIN THE DREAM ›</a>
            <div style="font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; margin-top:15px;">FOUNDER: LD✦ GHOST | SECONDARY: SE7ENSYNDRAXE</div>
        </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const playlist = [
            { id: '8q9Kz1FFDaM', name: 'MILIARDARA' },
            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },
            { id: '64afHun2_B0', name: 'J-Killz The Prince - Honey' },
            { id: 'PcEiHPlf894', name: 'Lipstick (Sped Up)' },
            { id: 'vTG4AvEnFLA', name: 'Desolate' }
        ];
        let currentTrack = 0;
        let player;
        let hudTimeout;
        let isMuted = false;
        let lastVolume = 30;
        let isAdPlaying = false;
        let canEnter = false;
        let enterAnimationFrame;
        const overlay = document.getElementById('enter-overlay');
        const enterText = document.getElementById('enter-text');
        const enterCanvas = document.getElementById('enter-particle-canvas');
        const enterCtx = enterCanvas.getContext('2d');
        const textSampler = document.createElement('canvas');
        const textSamplerCtx = textSampler.getContext('2d');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
                events: {
                    'onReady': (e) => { e.target.setVolume(30); renderPlaylist(); },
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                nextTrack();
            }
            const adState = player.getAdState && player.getAdState();
            if (adState === 1) {
                isAdPlaying = true;
                showHUD("REKLAM", "fa-solid fa-rectangle-ad", true);
            } else if (isAdPlaying) {
                isAdPlaying = false;
                showHUD(playlist[currentTrack].name, "fa-solid fa-music");
            }
        }
        function renderPlaylist() {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            playlist.forEach((song, index) => {
                const thumbUrl = `https://img.youtube.com/vi/${song.id}/mqdefault.jpg`;
                const item = document.createElement('div');
                item.className = `song-item ${index === currentTrack ? 'playing' : ''}`;
                item.innerHTML = `<img src="${thumbUrl}" class="song-thumb"><div class="song-info">${song.name}</div>`;
                item.onclick = () => playSong(index);
                listContainer.appendChild(item);
            });
        }
        function playSong(index) {
            currentTrack = index;
            player.loadVideoById(playlist[currentTrack].id);
            if(!isAdPlaying) showHUD(playlist[currentTrack].name, "fa-solid fa-music");
            renderPlaylist();
        }
        function togglePlaylist() { document.getElementById('playlist-container').classList.toggle('active'); }
        function showHUD(text, iconClass, sticky = false) {
            const hud = document.getElementById('music-hud');
            clearTimeout(hudTimeout);
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = iconClass;
           
            if(text === "REKLAM") hud.classList.add('ad-active');
            else hud.classList.remove('ad-active');
            hud.classList.add('show');
           
            if (!sticky) {
                hudTimeout = setTimeout(() => hud.classList.remove('show'), 2500);
            }
        }
        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo(); btn.className = "fa-solid fa-play"; showHUD("Durduruldu", "fa-solid fa-pause");
            } else {
                player.playVideo(); btn.className = "fa-solid fa-pause"; showHUD("Devam Ediyor", "fa-solid fa-play");
            }
        }
        const volSlider = document.getElementById('vol-slider');
        const volIcon = document.getElementById('vol-icon');
        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            player.setVolume(val);
            updateVolumeUI(val);
            showHUD(`Ses: %${val}`, getVolIconClass(val));
        });
        function toggleMute() {
            if (isMuted) {
                player.unMute(); player.setVolume(lastVolume); volSlider.value = lastVolume;
                updateVolumeUI(lastVolume); showHUD("Ses Açıldı", getVolIconClass(lastVolume));
                isMuted = false;
            } else {
                lastVolume = volSlider.value; player.mute(); volSlider.value = 0;
                updateVolumeUI(0); showHUD("Ses Kapatıldı", "fa-solid fa-volume-xmark");
                isMuted = true;
            }
        }
        function updateVolumeUI(val) {
            volIcon.className = getVolIconClass(val);
            isMuted = val == 0;
        }
        function getVolIconClass(val) {
            if (val == 0) return "fa-solid fa-volume-xmark";
            if (val < 50) return "fa-solid fa-volume-low";
            return "fa-solid fa-volume-high";
        }
        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; playSong(currentTrack); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; playSong(currentTrack); }
        function startExperience() {
            if (!canEnter) return;
            document.getElementById('enter-overlay').classList.add('hide');
            document.body.classList.add('loaded');
            if(player && player.playVideo) player.playVideo();
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
        }

        function initEnterCanvas() {
            const dpr = window.devicePixelRatio || 1;
            enterCanvas.width = window.innerWidth * dpr;
            enterCanvas.height = window.innerHeight * dpr;
            enterCanvas.style.width = `${window.innerWidth}px`;
            enterCanvas.style.height = `${window.innerHeight}px`;
            enterCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function createEdgeSpawn(width, height) {
            const side = Math.floor(Math.random() * 4);
            if (side === 0) return { x: Math.random() * width, y: -30 };
            if (side === 1) return { x: width + 30, y: Math.random() * height };
            if (side === 2) return { x: Math.random() * width, y: height + 30 };
            return { x: -30, y: Math.random() * height };
        }

        function sampleTextTargets() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            textSampler.width = width;
            textSampler.height = height;
            textSamplerCtx.clearRect(0, 0, width, height);
            textSamplerCtx.fillStyle = '#fff';
            textSamplerCtx.textAlign = 'center';
            textSamplerCtx.textBaseline = 'middle';
            textSamplerCtx.font = '700 11px Poppins';
            textSamplerCtx.letterSpacing = '12px';
            textSamplerCtx.fillText('CLICK TO ENTER', width / 2, height / 2);

            const pixels = textSamplerCtx.getImageData(0, 0, width, height).data;
            const targets = [];
            const step = Math.max(4, Math.floor(width / 260));
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const alpha = pixels[(y * width + x) * 4 + 3];
                    if (alpha > 100) {
                        targets.push({ x, y });
                    }
                }
            }
            return targets;
        }

        function runEnterParticles() {
            cancelAnimationFrame(enterAnimationFrame);
            initEnterCanvas();
            overlay.classList.remove('ready');
            enterText.style.opacity = '0';
            canEnter = false;

            const width = window.innerWidth;
            const height = window.innerHeight;
            const targets = sampleTextTargets();
            const particles = targets.map((target) => {
                const spawn = createEdgeSpawn(width, height);
                return {
                    x: spawn.x,
                    y: spawn.y,
                    tx: target.x,
                    ty: target.y,
                    size: Math.random() * 1.8 + 0.8,
                    alpha: Math.random() * 0.45 + 0.35,
                    delay: Math.random() * 45
                };
            });

            let frame = 0;
            let settledFrames = 0;

            function animate() {
                frame += 1;
                enterCtx.clearRect(0, 0, width, height);
                let settledCount = 0;

                for (const particle of particles) {
                    if (particle.delay > 0) {
                        particle.delay -= 1;
                    } else {
                        particle.x += (particle.tx - particle.x) * 0.075;
                        particle.y += (particle.ty - particle.y) * 0.075;
                    }

                    const dist = Math.hypot(particle.tx - particle.x, particle.ty - particle.y);
                    if (dist < 0.7) settledCount += 1;

                    enterCtx.beginPath();
                    enterCtx.fillStyle = `rgba(255,255,255,${particle.alpha})`;
                    enterCtx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    enterCtx.fill();
                }

                if (settledCount > particles.length * 0.92) {
                    settledFrames += 1;
                } else {
                    settledFrames = 0;
                }

                if (settledFrames > 12 || frame > 220) {
                    canEnter = true;
                    overlay.classList.add('ready');
                    enterText.style.opacity = '1';
                    cancelAnimationFrame(enterAnimationFrame);
                    return;
                }

                enterAnimationFrame = requestAnimationFrame(animate);
            }

            animate();
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 80; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 1.5 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.3)"; ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j]; if(Math.hypot(p.x - p2.x, p.y - p2.y) < 100) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => {
            initCanvas();
            if (!overlay.classList.contains('hide')) {
                runEnterParticles();
            }
        });
        initCanvas();
        draw();
        runEnterParticles();
    </script>
</body>
</html>
