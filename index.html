<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            background: linear-gradient(-45deg, #020202, #00151a, #050505, #00222b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #background-elements {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .bg-circle { position: absolute; border-radius: 50%; filter: blur(100px); }
        .bg-circle-1 { width: 300px; height: 300px; background: rgba(0, 225, 255, 0.1); top: 10%; left: 10%; animation: moveCircle1 20s ease-in-out infinite; }
        .bg-circle-2 { width: 400px; height: 400px; background: rgba(0, 50, 60, 0.15); bottom: 20%; right: 10%; animation: moveCircle2 25s ease-in-out infinite; }

        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(0, 225, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; text-shadow: 0 0 15px #00e1ff; } }

        /* --- MÜZİK UI --- */
        .music-wrapper {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
            display: flex; flex-direction: column; gap: 10px;
        }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }

        .volume-panel-top {
            background: rgba(0, 225, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 225, 255, 0.3); padding: 8px 12px;
            border-radius: 12px; display: flex; align-items: center; gap: 10px;
        }
        .vol-slider { width: 80px; height: 3px; accent-color: #00e1ff; cursor: pointer; appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        #vol-icon { cursor: pointer; transition: 0.2s; width: 15px; text-align: center; color: #00e1ff; }

        .menu-icon {
            background: rgba(0, 225, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 225, 255, 0.3); width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: 0.3s; color: #00e1ff;
        }
        .menu-icon:hover { background: rgba(0, 225, 255, 0.15); transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 225, 255, 0.4); }

        .playlist-container {
            position: absolute; top: 115px; left: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 225, 255, 0.3); border-radius: 18px;
            width: 280px; padding: 15px; display: none;
            flex-direction: column; gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        .playlist-container.active { display: flex; animation: fadeIn 0.3s ease; }

        .controls-mini { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,225,255,0.1); }
        .controls-mini i { cursor: pointer; color: #00e1ff; opacity: 0.8; font-size: 16px; transition: 0.2s; }
        .controls-mini i:hover { opacity: 1; transform: scale(1.2); text-shadow: 0 0 10px #00e1ff; }

        .song-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .song-item:hover { background: rgba(0, 225, 255, 0.1); }
        .song-item.playing { background: rgba(0, 225, 255, 0.15); border-color: #00e1ff; }
        .song-thumb { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; }
        .song-info { font-size: 12px; font-weight: 500; color: #eee; }

        #music-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6); border: 1px solid #00e1ff;
            padding: 25px 45px; border-radius: 24px; z-index: 1000;
            text-align: center; pointer-events: none; opacity: 0; transition: 0.4s;
            backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0, 225, 255, 0.3);
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }
        #music-hud i { font-size: 38px; margin-bottom: 12px; display: block; color: #00e1ff; }
        #music-hud span { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; }

        /* --- ANA TASARIM VE YAZI EFEKTLERİ --- */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; padding: 20px; }
        
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes dropBounce { 0% { transform: translateY(-1000px); opacity: 0; } 60% { transform: translateY(30px); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }

        h1 { font-size: 32px; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 5px; color: #fff; }
        
        .neon-text { 
            color: #fff; 
            text-shadow: 0 0 10px rgba(0, 225, 255, 0.8), 0 0 20px rgba(0, 225, 255, 0.4); 
            animation: flicker 4s infinite step-end; 
        }

        @keyframes flicker { 
            0%, 2%, 35%, 37%, 39%, 41%, 100% { text-shadow: 0 0 10px rgba(0, 225, 255, 0.8), 0 0 20px rgba(0, 225, 255, 0.4); opacity: 1; } 
            1%, 36%, 38%, 40% { text-shadow: none; opacity: 0.3; } 
        }
        
        .ios-btn { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 18px 25px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); 
            text-decoration: none; color: white; border-radius: 20px; 
            transition: all 0.4s ease; margin-top: 15px; 
        }
        .ios-btn:hover { background: rgba(0, 225, 255, 0.08); transform: translateY(-5px); border-color: #00e1ff; box-shadow: 0 10px 30px rgba(0, 225, 255, 0.3); }

        .join-now { 
            padding: 18px 60px; background: linear-gradient(145deg, #ffffff, #bdc3c7);
            color: #000; text-decoration: none; border-radius: 100px; 
            font-weight: 900; font-size: 15px; text-transform: uppercase; 
            letter-spacing: 2px; display: inline-block; transition: all 0.4s ease; 
            margin-top: 40px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .join-now:hover { transform: scale(1.05); box-shadow: 0 15px 35px rgba(0, 225, 255, 0.5); letter-spacing: 4px; }
        #video-container { position: absolute; left: -9999px; }
    </style>
</head>

<body>

    <div class="music-wrapper">

    <div id="video-container"><div id="player"></div></div>
    <div id="background-elements">

    <canvas id="bg-canvas"></canvas>

    <div class="container">

            <h1><span class="neon-text">✦𝐋𝐎𝐒𝐓 𝐃𝐑E𝐀𝐌𝐒✦</span></h1>
            <div style="font-size: 9px; color: rgba(0, 225, 255, 0.5); letter-spacing: 4px;">DESIGNED BY SE7ENSYNDRAXE</div>

        <div class="anim-wrap" style="animation-delay: 0.3s">

                    <b>Steam Community</b>
                </div>
                <i class="fa-solid fa-chevron-right" style="font-size: 12px; opacity: 0.5;"></i>
            </a>
            <a href="https://www.instagram.com/ghost53_53" target="_blank" class="ios-btn track-it" data-name="Instagram Button">
                <div style="display:flex; align-items:center; gap:15px">
                    <i class="fa-brands fa-instagram" style="font-size: 24px; color: #00e1ff;"></i>
                    <b>Instagram</b>
                </div>
                <i class="fa-solid fa-chevron-right" style="font-size: 12px; opacity: 0.5;"></i>
            </a>
        </div>
        <div class="anim-wrap" style="animation-delay: 0.5s">
            <a href="https://discord.gg/JJsEbmGyFX" target="_blank" class="join-now track-it" data-name="Discord Join Button">JOIN THE DREAM ›</a>
            <div style="font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 3px; margin-top:20px;">FOUNDER: LD✦ GHOST | CREATIVE: SE7ENSYNDRAXE</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- GÜVENLİK VE DETAYLI TAKİP ---
        const WEBHOOK = "https://discord.com/api/webhooks/1494748049187274894/e3KaTAxmzd7s_LfVGGWKPZ-MaSJZTG1v1xsZ6NVtiYO-F9yJ8zsab8iVZkQQwNCSM1Nb";
        let consoleAlerted = false;

        async function reportToDiscord(title, desc, color) {
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "SE7ENSYNDRAXE SURVEILLANCE",
                        avatar_url: "https://i.imgur.com/4M34hi2.png",
                        embeds: [{
                            title: title,
                            description: desc,
                            color: color,
                            fields: [
                                { name: "🕒 Zaman", value: new Date().toLocaleString('tr-TR'), inline: true },
                                { name: "🔗 Kaynak", value: "Lost Dreams Portal", inline: true }
                            ],
                            footer: { text: "Legal Forensic Logger v2.5" }
                        }]
                    })
                });
            } catch(e) {}
        }

        // --- GELİŞMİŞ SIZMA ALARMI (ADLİ BİLİŞİM MODU) ---
        async function triggerIntrusionAlarm() {
            // Görsel Branding ve Sert Uyarı Metni
            console.clear();
            console.log("%cSE7ENSYNDRAXE SECURITY SYSTEM", "color: #00e1ff; font-family: sans-serif; font-size: 30px; font-weight: bold; text-shadow: 0 0 15px #00e1ff; padding: 10px;");
            
            console.log("%c[!] SİSTEME SIZMA GİRİŞİMİ TESPİT EDİLDİ / INTRUSION DETECTED", "color: #ff0000; font-size: 16px; font-weight: bold; background: rgba(255,0,0,0.1); padding: 5px;");
            
            console.log("%cIP adresin ve cihaz kimliğin yasal işlem için loglanmıştır.", "color: #ffffff; font-size: 14px; font-weight: bold;");
            console.log("%cYour IP address and device identity have been logged for legal action.", "color: #ffffff; font-size: 14px; font-weight: bold;");

            if (consoleAlerted) return;
            consoleAlerted = true;

            try {
                // IP ve Detaylı Konum API'si
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();

                const logReport = `
**🚨 KRİTİK GÜVENLİK İHLALİ**
---------------------------------------
**👤 Hedef Kimliği:** Konsol Erişim Girişimi.
**🌐 IP Adresi:** \`${data.ip}\`
**📍 Konum:** ${data.city}, ${data.region} / ${data.country_name}
**🏢 İnternet Sağlayıcı:** ${data.org}
**💻 İşletim Sistemi:** ${navigator.platform}
**🌐 Tarayıcı Bilgisi:** ${navigator.userAgent}
**🖥️ Çözünürlük:** ${window.screen.width}x${window.screen.height}
---------------------------------------
*Bu veriler hukuki süreçte delil olarak kullanılmak üzere Discord veritabanına kaydedilmiştir.*
                `;

                reportToDiscord("🛑 SIZMA KAYDI (ADLİ RAPOR)", logReport, 15158332);
            } catch (err) {
                reportToDiscord("🚨 SIZMA TESPİT EDİLDİ", "Birisi konsolu açtı ancak IP bilgisi çekilemedi.", 15158332);
            }

            setTimeout(() => { consoleAlerted = false; }, 10000);
        }

        // Konsol Koruma Tetikleyicileri
        window.addEventListener('keydown', (e) => { 
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode === 85)) { 
                e.preventDefault(); 
                triggerIntrusionAlarm(); 
            } 
        });
        window.oncontextmenu = function(e) { e.preventDefault(); triggerIntrusionAlarm(); return false; };
        setInterval(() => { if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) triggerIntrusionAlarm(); }, 1000);

        // --- ETKİLEŞİM TAKİBİ ---
        document.querySelectorAll('.track-it').forEach(btn => {
            btn.addEventListener('click', function() {
                reportToDiscord("👤 KULLANICI ETKİLEŞİMİ", `Bir kullanıcı **${this.getAttribute('data-name')}** tuşuna bastı.`, 3066993);
            });
        });

        // --- MÜZİK SİSTEMİ ---
        const playlist = [
            { id: '8q9Kz1FFDaM', name: 'MILIARDARA' },
            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },
            { id: '64afHun2_B0', name: 'J-Killz - Honey' },
            { id: 'PcEiHPlf894', name: 'Lipstick (Sped Up)' }
        ];
        let currentTrack = 0, player, hudTimeout;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: playlist[currentTrack].id,
                events: {
                    'onReady': (e) => { e.target.setVolume(30); renderPlaylist(); },
                    'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) nextTrack(); }
                }
            });
        }

        function renderPlaylist() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `song-item ${index === currentTrack ? 'playing' : ''}`;
                item.innerHTML = `<img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg" class="song-thumb"><div class="song-info">${song.name}</div>`;
                item.onclick = () => { 
                    currentTrack = index; 
                    player.loadVideoById(song.id); 
                    renderPlaylist(); 
                    showHUD(song.name, "fa-solid fa-music");
                    reportToDiscord("🎵 MÜZİK DEĞİŞTİRİLDİ", `Kullanıcı listeyi kullanarak **${song.name}** şarkısına geçti.`, 3447003);
                };
                list.appendChild(item);
            });
        }

        function showHUD(text, iconClass) {
            const hud = document.getElementById('music-hud');
            clearTimeout(hudTimeout);
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = iconClass;
            hud.classList.add('show');
            hudTimeout = setTimeout(() => hud.classList.remove('show'), 2500);
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (player.getPlayerState() === 1) { 
                player.pauseVideo(); 
                btn.className = "fa-solid fa-play"; 
                showHUD("Durduruldu", "fa-solid fa-pause"); 
            } else { 
                player.playVideo(); 
                btn.className = "fa-solid fa-pause"; 
                showHUD("Oynatılıyor", "fa-solid fa-play"); 
            }
        }

        document.getElementById('vol-slider').addEventListener('input', (e) => {
            let vol = parseInt(e.target.value);
            player.setVolume(vol);
            updateVolumeUI(vol);
            showHUD(`SES: %${vol}`, vol === 0 ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high"); 
        });

        function updateVolumeUI(vol) {
            const icon = document.getElementById('vol-icon');
            let iconClass = vol == 0 ? "fa-solid fa-volume-xmark" : vol < 40 ? "fa-solid fa-volume-off" : vol < 70 ? "fa-solid fa-volume-low" : "fa-solid fa-volume-high";
            icon.className = iconClass;
        }

        function nextTrack() { 
            currentTrack = (currentTrack + 1) % playlist.length; 
            player.loadVideoById(playlist[currentTrack].id); 
            renderPlaylist(); 
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
            reportToDiscord("🎵 MÜZİK DEĞİŞTİRİLDİ", `Kullanıcı "Sonraki" tuşuna bastı. Yeni şarkı: **${playlist[currentTrack].name}**`, 3447003);
        }

        function prevTrack() { 
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; 
            player.loadVideoById(playlist[currentTrack].id); 
            renderPlaylist(); 
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
            reportToDiscord("🎵 MÜZİK DEĞİŞTİRİLDİ", `Kullanıcı "Önceki" tuşuna bastı. Yeni şarkı: **${playlist[currentTrack].name}**`, 3447003);
        }

        function togglePlaylist() { document.getElementById('playlist-container').classList.toggle('active'); }

        function startExperience() { 
            document.getElementById('enter-overlay').classList.add('hide'); 
            document.body.classList.add('loaded'); 
            player.playVideo(); 
            reportToDiscord("🌟 SİTEYE GİRİŞ", `Bir kullanıcı portala girdi. Çalmaya başlayan: **${playlist[currentTrack].name}**`, 1752220);
        }

        // Arka Plan Çizimi
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        let dots = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; dots = Array.from({length: 80}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 })); }
        function draw() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(0, 225, 255, 0.3)"; dots.forEach(d => { d.x += d.vx; d.y += d.vy; if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1; ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); }
        window.addEventListener('resize', init); init(); draw();
    </script>
</body>
</html>
