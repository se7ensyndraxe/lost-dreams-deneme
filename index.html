<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Giriş Ekranı */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Müzik Paneli ve Playlist */
        .music-wrapper {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }

        .menu-icon {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1.5px solid #ffffff; width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .menu-icon:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }

        .playlist-container {
            position: absolute; top: 55px; left: 0;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1.5px solid #ffffff; border-radius: 16px;
            width: 250px; padding: 15px; display: none;
            flex-direction: column; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .playlist-container.active { display: flex; animation: fadeIn 0.3s ease; }

        .song-item {
            padding: 10px; border-radius: 8px; cursor: pointer;
            font-size: 13px; transition: 0.2s; border: 1px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-item:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); }
        .song-item.playing { background: rgba(255, 255, 255, 0.2); font-weight: bold; border-color: #fff; }

        .controls-mini {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .controls-mini i { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .controls-mini i:hover { opacity: 1; transform: scale(1.1); }

        /* Ortadaki Bildirim Paneli (HUD) */
        #music-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid #ffffff;
            padding: 25px 45px; border-radius: 24px; z-index: 1000;
            text-align: center; pointer-events: none; opacity: 0; transition: 0.4s;
            backdrop-filter: blur(6px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }
        #music-hud i { font-size: 38px; margin-bottom: 12px; display: block; }
        #music-hud span { font-size: 14px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Diğer Tasarımlar */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.15), transparent 50%), radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.15), transparent 50%); z-index: -1; }
        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; padding: 20px; }
        @keyframes dropBounce { 0% { transform: translateY(-1000px); opacity: 0; } 60% { transform: translateY(30px); opacity: 1; } 80% { transform: translateY(-10px); } 100% { transform: translateY(0); opacity: 1; } }
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        h1 { font-size: 30px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; color: #fff; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .neon-text { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4); }
        .lost-side { animation: flickerLost 4s infinite; display: flex; align-items: center; gap: 12px; }
        .dreams-side { animation: flickerDreams 6s infinite; display: flex; align-items: center; gap: 12px; }
        @keyframes flickerLost { 0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 10px #fff, 0 0 20px #fff; } 20%, 24%, 55% { opacity: 0.2; text-shadow: none; } }
        @keyframes flickerDreams { 0%, 12%, 15%, 26%, 28%, 80%, 84%, 100% { opacity: 1; text-shadow: 0 0 10px #fff, 0 0 20px #fff; } 13%, 27%, 82% { opacity: 0.1; text-shadow: none; } }
        .designer-tag, .founder-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; }
        .designer-tag { margin-bottom: 40px; }
        .founder-tag { margin-top: 15px; }
        .link-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .ios-btn { display: flex; align-items: center; justify-content: space-between; padding: 18px 25px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); text-decoration: none; color: white; border-radius: 20px; transition: 0.3s; }
        .ios-btn:hover { background: rgba(255, 255, 255, 0.12); transform: scale(1.05); }
        .join-now-wrap { margin-top: 45px; }
        .join-now { padding: 18px 60px; background: linear-gradient(90deg, #000, #fff); color: #000; text-decoration: none; border-radius: 100px; font-weight: 900; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; display: inline-block; transition: 0.3s; }
        .join-now:hover { transform: scale(1.1) translateY(-10px); box-shadow: 0 15px 40px rgba(255,255,255,0.3); }
        #video-container { position: absolute; left: -9999px; }
    </style>
</head>

<body oncontextmenu="return false;" ondragstart="return false;">

    <div id="enter-overlay" onclick="startExperience()">
        <h2>CLICK TO ENTER</h2>
    </div>

    <div id="music-hud">
        <i id="hud-icon" class="fa-solid fa-music"></i>
        <span id="hud-text">Müzik Çalıyor</span>
    </div>

    <div class="music-wrapper">
        <div class="menu-icon" onclick="togglePlaylist()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="playlist-container" id="playlist-container">
            <div class="controls-mini">
                <i class="fa-solid fa-backward-step" onclick="prevTrack()"></i>
                <i id="play-pause-btn" class="fa-solid fa-pause" onclick="togglePlay()"></i>
                <i class="fa-solid fa-forward-step" onclick="nextTrack()"></i>
                <input type="range" id="vol-slider" min="0" max="100" value="30" style="width:50px; height:3px;">
            </div>
            <div id="song-list">
                </div>
        </div>
    </div>

    <div id="video-container"><div id="player"></div></div>
    <div class="static-bg"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="anim-wrap delay-1">
            <h1>
                <div class="lost-side"><span>✦</span><span class="neon-text">𝐋𝐎𝐒𝐓</span></div>
                <div class="dreams-side"><span class="neon-text">𝐃𝐑E𝐀𝐌𝐒</span><span>✦</span></div>
            </h1>
            <div class="designer-tag">DESIGNED BY SE7ENSYNDRAXE</div>
        </div>

        <div class="link-wrapper">
            <div class="anim-wrap delay-2">
                <a href="https://steamcommunity.com/groups/LDLOSTDREAMSLD" target="_blank" class="ios-btn">
                    <div style="display:flex; align-items:center; gap:15px">
                        <div style="width:44px; height:44px; background:#1b2838; border-radius:12px; display:flex; align-items:center; justify-content:center"><i class="fa-brands fa-steam"></i></div>
                        <div><b>Steam Community</b></div>
                    </div>
                </a>
            </div>
            <div class="anim-wrap delay-3">
                <a href="https://www.instagram.com/ghost53_53?igsh=MXhqbG0zNXplNDNvdg==" target="_blank" class="ios-btn">
                    <div style="display:flex; align-items:center; gap:15px">
                        <div style="width:44px; height:44px; background:rgba(255,255,255,0.1); border-radius:12px; display:flex; align-items:center; justify-content:center"><i class="fa-brands fa-instagram"></i></div>
                        <div><b>Instagram</b></div>
                    </div>
                </a>
            </div>
        </div>

        <div class="join-now-wrap anim-wrap delay-4">
            <a href="https://discord.gg/JJsEbmGyFX" target="_blank" class="join-now">JOIN THE DREAM ›</a>
            <div class="founder-tag">FOUNDER: LD✦ GHOST | SECONDARY FOUNDER: SE7ENSYNDRAXE</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const playlist = [
            { id: '8q9Kz1FFDaM', name: 'MILIARDARA' },
            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },
            { id: '64afHun2_B0', name: 'J-Killz The Prince - Honey' },
            { id: 'PcEiHPlf894', name: 'Lipstick (Sped Up)' },
            { id: 'vTG4AvEnFLA', name: 'Desolate' }
        ];
        let currentTrack = 0;
        let player;
        let hudTimeout;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1',
                videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1 },
                events: {
                    'onReady': (e) => {
                        e.target.setVolume(30);
                        renderPlaylist();
                    },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) nextTrack();
                    }
                }
            });
        }

        function renderPlaylist() {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `song-item ${index === currentTrack ? 'playing' : ''}`;
                item.innerText = song.name;
                item.onclick = () => playSong(index);
                listContainer.appendChild(item);
            });
        }

        function playSong(index) {
            currentTrack = index;
            player.loadVideoById(playlist[currentTrack].id);
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
            renderPlaylist();
        }

        function togglePlaylist() {
            document.getElementById('playlist-container').classList.toggle('active');
        }

        function showHUD(text, iconClass) {
            const hud = document.getElementById('music-hud');
            clearTimeout(hudTimeout);
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = iconClass;
            hud.classList.add('show');
            hudTimeout = setTimeout(() => hud.classList.remove('show'), 2000);
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                btn.className = "fa-solid fa-play";
                showHUD("Durduruldu", "fa-solid fa-pause");
            } else {
                player.playVideo();
                btn.className = "fa-solid fa-pause";
                showHUD("Devam Ediyor", "fa-solid fa-play");
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            playSong(currentTrack);
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            playSong(currentTrack);
        }

        document.getElementById('vol-slider').addEventListener('input', (e) => {
            player.setVolume(e.target.value);
        });

        function startExperience() { 
            document.getElementById('enter-overlay').classList.add('hide'); 
            document.body.classList.add('loaded'); 
            if(player && player.playVideo) player.playVideo(); 
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
        }

        // Parçacık Animasyonu (Aynı)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 80; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, size: Math.random() * 1.5 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.3)"; ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j]; if(Math.hypot(p.x - p2.x, p.y - p2.y) < 100) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); draw();
    </script>
</body>
</html>
