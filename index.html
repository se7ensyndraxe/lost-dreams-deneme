<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* GİRİŞ PERDESİ - TAKILMA ÖNLEYİCİ */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        #enter-overlay.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #enter-overlay h2 {
            font-size: 11px; letter-spacing: 12px; color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase; animation: neon 2s infinite;
        }
        @keyframes neon { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* SES PANELİ */
        .music-panel {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 12px 18px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
        }
        body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        .vol-slider { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; }

        /* CANVAS & BG */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .static-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(188, 24, 136, 0.15), transparent 40%);
            z-index: -1;
        }

        /* İÇERİK */
        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; padding: 20px; }

        @keyframes dropBounce {
            0% { transform: translateY(-1000px); opacity: 0; }
            60% { transform: translateY(30px); opacity: 1; }
            80% { transform: translateY(-10px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }
        .delay-4 { animation-delay: 0.7s; }

        h1 { font-size: 34px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; }
        .designer-tag { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }

        .link-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .ios-btn {
            display: flex; align-items: center; justify-content: space-between; padding: 18px 25px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); text-decoration: none; color: white; border-radius: 20px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-btn:hover { background: rgba(255, 255, 255, 0.12); transform: scale(1.05) translateY(-5px); border-color: rgba(255,255,255,0.3); }

        .btn-left { display: flex; align-items: center; gap: 15px; }
        .icon-box { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .steam-bg { background: #1b2838; }
        .insta-bg { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        .join-now-wrap { margin-top: 45px; }
        .join-now {
            padding: 18px 60px; background: linear-gradient(90deg, #000, #fff);
            color: #000; text-decoration: none; border-radius: 100px;
            font-weight: 900; font-size: 15px; text-transform: uppercase; letter-spacing: 2px;
            display: inline-block; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .join-now:hover { transform: scale(1.1) translateY(-10px); box-shadow: 0 15px 40px rgba(255,255,255,0.3); }

        #video-container { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div id="enter-overlay" onclick="startExperience()">
        <h2>CLICK TO ENTER</h2>
    </div>

    <div class="music-panel">
        <i class="fa-solid fa-volume-high" style="color:#5865F2;"></i>
        <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30">
    </div>

    <div id="video-container"><div id="player"></div></div>

    <div class="static-bg"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="anim-wrap delay-1">
            <h1>✦ 𝐋𝐎𝐒𝐓 𝐃𝐑E𝐀𝐌𝐒 ✦</h1>
            <div class="designer-tag">DESIGNED BY SE7ENSYNDRAXE | LD GHOST</div>
        </div>

        <div class="link-wrapper">
            <div class="anim-wrap delay-2">
                <a href="https://steamcommunity.com/groups/LDLOSTDREAMSLD" target="_blank" class="ios-btn">
                    <div class="btn-left">
                        <div class="icon-box steam-bg"><i class="fa-brands fa-steam"></i></div>
                        <div><b style="display:block">Steam Community</b><small style="opacity:0.5; font-size:10px">Topluluğa Katıl</small></div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="opacity:0.2"></i>
                </a>
            </div>
            <div class="anim-wrap delay-3">
                <a href="https://www.instagram.com/ghost53_53?igsh=MXhqbG0zNXplNDNvdg==" target="_blank" class="ios-btn">
                    <div class="btn-left">
                        <div class="icon-box insta-bg"><i class="fa-brands fa-instagram"></i></div>
                        <div><b style="display:block">Instagram</b><small style="opacity:0.5; font-size:10px">Founder Profile</small></div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="opacity:0.2"></i>
                </a>
            </div>
        </div>

        <div class="join-now-wrap anim-wrap delay-4">
            <a href="https://discord.gg/JJsEbmGyFX" target="_blank" class="join-now">JOIN THE DREAM ›</a>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 1.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 100) {
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); draw();

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: '8q9Kz1FFDaM',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': '8q9Kz1FFDaM' },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }

        function startExperience() {
            // Force Hide Overlay
            const overlay = document.getElementById('enter-overlay');
            overlay.classList.add('hide');
            document.body.classList.add('loaded');
            
            // Play Video
            if(player && player.playVideo) {
                player.playVideo();
            }
        }

        document.getElementById('vol-slider').addEventListener('input', (e) => {
            if(player) player.setVolume(e.target.value);
        });
    </script>
</body>
</html>
