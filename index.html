<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Yeni Giriş Ekranı (Particle Overlay) */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s;
            cursor: default; /* Başlangıçta tıklanamaz */
        }
        #enter-overlay.ready { cursor: pointer; }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }

        #intro-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #enter-text {
            font-size: 12px; letter-spacing: 15px; color: white;
            text-transform: uppercase; z-index: 10; opacity: 0;
            transition: opacity 1s ease, text-shadow 0.5s ease;
            font-weight: 700;
        }
        #enter-text.show { opacity: 1; animation: neonPulse 2s infinite; }
        @keyframes neonPulse { 0%, 100% { text-shadow: 0 0 10px #fff; opacity: 0.6; } 50% { text-shadow: 0 0 25px #fff; opacity: 1; } }

        /* Müzik Paneli */
        .music-wrapper {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
            display: flex; flex-direction: column; gap: 10px;
        }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }

        .volume-panel-top {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1.5px solid #ffffff; padding: 8px 12px;
            border-radius: 12px; display: flex; align-items: center; gap: 10px;
        }
        .vol-slider { width: 80px; height: 3px; accent-color: #fff; cursor: pointer; appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        #vol-icon { cursor: pointer; transition: 0.2s; width: 15px; text-align: center; }

        .menu-icon {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border: 1.5px solid #ffffff; width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }

        .playlist-container {
            position: absolute; top: 115px; left: 0;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1.5px solid #ffffff; border-radius: 18px;
            width: 280px; padding: 15px; display: none;
            flex-direction: column; gap: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .playlist-container.active { display: flex; animation: fadeIn 0.3s ease; }

        .song-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .song-item.playing { background: rgba(255, 255, 255, 0.15); border-color: #fff; border: 1px solid #fff; }
        .song-thumb { width: 35px; height: 35px; border-radius: 6px; object-fit: cover; }
        .song-info { font-size: 11px; font-weight: 500; }

        /* HUD */
        #music-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid #ffffff;
            padding: 25px 45px; border-radius: 24px; z-index: 1000;
            text-align: center; pointer-events: none; opacity: 0; transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }

        /* Ana İçerik */
        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; }
        .anim-wrap { opacity: 0; }
        body.loaded .anim-wrap { animation: dropBounce 1.2s forwards; }
        @keyframes dropBounce { 0% { transform: translateY(-100px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        
        h1 { font-size: 30px; letter-spacing: 5px; text-transform: uppercase; display: flex; justify-content: center; gap: 12px; }
        .neon-text { text-shadow: 0 0 10px #fff; }
        .ios-btn { display: flex; align-items: center; gap: 15px; padding: 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); text-decoration: none; color: white; border-radius: 20px; transition: 0.3s; margin-top: 15px; }
        .join-now { padding: 18px 60px; background: linear-gradient(90deg, #000, #fff); color: #000; text-decoration: none; border-radius: 100px; font-weight: 900; display: inline-block; margin-top: 40px; }
        
        #video-container { position: absolute; left: -9999px; }
        #bg-canvas { position: absolute; width: 100%; height: 100%; z-index: 0; }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="enter-overlay">
        <canvas id="intro-canvas"></canvas>
        <h2 id="enter-text" onclick="startExperience()">CLICK TO ENTER</h2>
    </div>

    <div id="music-hud">
        <i id="hud-icon" class="fa-solid fa-music"></i>
        <span id="hud-text">Yükleniyor...</span>
    </div>

    <div class="music-wrapper">
        <div class="volume-panel-top">
            <i id="vol-icon" class="fa-solid fa-volume-high" onclick="toggleMute()"></i>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30">
        </div>
        <div class="menu-icon" onclick="togglePlaylist()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="playlist-container" id="playlist-container">
            <div id="song-list"></div>
        </div>
    </div>

    <div id="video-container"><div id="player"></div></div>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="anim-wrap">
            <h1>
                <div style="display:flex; align-items:center; gap:12px;"><span>✦</span><span class="neon-text">𝐋𝐎𝐒𝐓</span></div>
                <div style="display:flex; align-items:center; gap:12px;"><span class="neon-text">𝐃𝐑E𝐀𝐌𝐒</span><span>✦</span></div>
            </h1>
            <div style="font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px;">DESIGNED BY SE7ENSYNDRAXE</div>
        </div>

        <div class="anim-wrap">
            <a href="https://steamcommunity.com/groups/LDLOSTDREAMSLD" target="_blank" class="ios-btn">
                <i class="fa-brands fa-steam"></i><b>Steam Community</b>
            </a>
            <a href="https://www.instagram.com/ghost53_53" target="_blank" class="ios-btn">
                <i class="fa-brands fa-instagram"></i><b>Instagram</b>
            </a>
        </div>

        <div class="anim-wrap">
            <a href="https://discord.gg/JJsEbmGyFX" target="_blank" class="join-now">JOIN THE DREAM ›</a>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Intro Animasyonu Kontrolü
        const introCanvas = document.getElementById('intro-canvas');
        const ictx = introCanvas.getContext('2d');
        const enterText = document.getElementById('enter-text');
        const enterOverlay = document.getElementById('enter-overlay');
        
        let introParticles = [];
        let canClick = false;
        let animationFrame;

        function initIntro() {
            introCanvas.width = window.innerWidth;
            introCanvas.height = window.innerHeight;
            for(let i = 0; i < 400; i++) {
                // Köşelerden başlat
                let x, y;
                const side = Math.floor(Math.random() * 4);
                if(side === 0) { x = Math.random() * introCanvas.width; y = -20; }
                else if(side === 1) { x = Math.random() * introCanvas.width; y = introCanvas.height + 20; }
                else if(side === 2) { x = -20; y = Math.random() * introCanvas.height; }
                else { x = introCanvas.width + 20; y = Math.random() * introCanvas.height; }

                introParticles.push({
                    x: x, y: y,
                    targetX: introCanvas.width / 2,
                    targetY: introCanvas.height / 2,
                    v: 0.02 + Math.random() * 0.03,
                    size: Math.random() * 2,
                    alpha: Math.random()
                });
            }
            animateIntro();
            
            // 3 saniye sonra tıklamaya izin ver
            setTimeout(() => {
                canClick = true;
                enterText.classList.add('show');
                enterOverlay.classList.add('ready');
            }, 3500);
        }

        function animateIntro() {
            ictx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ictx.fillRect(0, 0, introCanvas.width, introCanvas.height);
            
            introParticles.forEach(p => {
                // Merkeze çekim
                p.x += (p.targetX - p.x) * p.v;
                p.y += (p.targetY - p.y) * p.v;
                
                ictx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ictx.beginPath();
                ictx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ictx.fill();
            });

            if(!canClick) {
                animationFrame = requestAnimationFrame(animateIntro);
            } else {
                // Yavaşça dağıt veya bitir
                ictx.clearRect(0, 0, introCanvas.width, introCanvas.height);
            }
        }

        const playlist = [
            { id: '8q9Kz1FFDaM', name: 'MILIARDARA' },
            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },
            { id: '64afHun2_B0', name: 'J-Killz The Prince - Honey' }
        ];
        let currentTrack = 0;
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 'onReady': (e) => { e.target.setVolume(30); renderPlaylist(); } }
            });
        }

        function renderPlaylist() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            playlist.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === currentTrack ? 'playing' : ''}`;
                item.innerHTML = `<img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg" class="song-thumb"> <span class="song-info">${song.name}</span>`;
                item.onclick = () => { currentTrack = i; player.loadVideoById(song.id); renderPlaylist(); };
                list.appendChild(item);
            });
        }

        function showHUD(text, icon) {
            const h = document.getElementById('music-hud');
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = icon;
            h.classList.add('show');
            setTimeout(() => h.classList.remove('show'), 2000);
        }

        function togglePlaylist() { document.getElementById('playlist-container').classList.toggle('active'); }

        function startExperience() { 
            if(!canClick) return;
            enterOverlay.classList.add('hide'); 
            document.body.classList.add('loaded'); 
            player.playVideo(); 
            showHUD(playlist[currentTrack].name, "fa-solid fa-music");
        }

        // Ses Ayarları
        document.getElementById('vol-slider').addEventListener('input', (e) => {
            player.setVolume(e.target.value);
            showHUD(`Ses: %${e.target.value}`, "fa-solid fa-volume-low");
        });

        window.onload = initIntro;
    </script>
</body>
</html>
