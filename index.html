<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            background: linear-gradient(-45deg, #020202, #00151a, #050505, #00222b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #background-elements {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .bg-circle {
            position: absolute; border-radius: 50%; filter: blur(100px);
        }
        .bg-circle-1 {
            width: 300px; height: 300px; background: rgba(0, 225, 255, 0.1);
            top: 10%; left: 10%; animation: moveCircle1 20s ease-in-out infinite;
        }
        .bg-circle-2 {
            width: 400px; height: 400px; background: rgba(0, 50, 60, 0.15);
            bottom: 20%; right: 10%; animation: moveCircle2 25s ease-in-out infinite;
        }
        @keyframes moveCircle1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(100px, 50px); } }
        @keyframes moveCircle2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-100px, -50px); } }

        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 11px; letter-spacing: 12px; color: rgba(0, 225, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; text-shadow: 0 0 15px #00e1ff; } }

        .music-wrapper {
            position: absolute; top: 30px; left: 30px; z-index: 500;
            opacity: 0; transform: translateX(-30px); transition: 1s ease 0.5s;
            display: flex; flex-direction: column; gap: 10px;
        }
        body.loaded .music-wrapper { opacity: 1; transform: translateX(0); }

        .volume-panel-top {
            background: rgba(0, 225, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 225, 255, 0.3); padding: 8px 12px;
            border-radius: 12px; display: flex; align-items: center; gap: 10px;
        }
        .vol-slider { width: 80px; height: 3px; accent-color: #00e1ff; cursor: pointer; appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        #vol-icon { cursor: pointer; width: 15px; color: #00e1ff; }

        .menu-icon {
            background: rgba(0, 225, 255, 0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 225, 255, 0.3); width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: 0.3s; color: #00e1ff;
        }
        .playlist-container {
            position: absolute; top: 115px; left: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 225, 255, 0.3); border-radius: 18px; width: 280px; padding: 15px; 
            display: none; flex-direction: column; gap: 8px;
        }
        .playlist-container.active { display: flex; animation: fadeIn 0.3s ease; }

        .song-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .song-item:hover { background: rgba(0, 225, 255, 0.1); }
        .song-item.playing { background: rgba(0, 225, 255, 0.15); border-color: #00e1ff; border: 1px solid #00e1ff; }

        #music-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6); border: 1px solid #00e1ff; padding: 25px 45px;
            border-radius: 24px; z-index: 1000; text-align: center; pointer-events: none;
            opacity: 0; transition: 0.4s; backdrop-filter: blur(15px);
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }

        .container { text-align: center; z-index: 10; width: 100%; max-width: 440px; }
        h1 { font-size: 32px; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 5px; }
        .neon-text { color: #fff; text-shadow: 0 0 10px rgba(0, 225, 255, 0.8); }
        
        .ios-btn { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 18px 25px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); 
            text-decoration: none; color: white; border-radius: 20px; 
            transition: all 0.4s ease; margin-top: 15px; 
        }
        .ios-btn:hover { border-color: #00e1ff; background: rgba(0, 225, 255, 0.08); }
        .join-now { 
            padding: 18px 60px; background: #fff; color: #000; 
            text-decoration: none; border-radius: 100px; font-weight: 900; 
            margin-top: 40px; display: inline-block; transition: 0.4s;
        }
        #video-container { position: absolute; left: -9999px; }
    </style>
</head>

<body oncontextmenu="return false;">

        <h2>CLICK TO ENTER</h2>
    </div>

    <div id="music-hud">
        <i id="hud-icon" class="fa-solid fa-music"></i><br>
        <span id="hud-text">Yükleniyor...</span>
    </div>

    <div class="music-wrapper">
        <div class="volume-panel-top">
            <i id="vol-icon" class="fa-solid fa-volume-high"></i>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="30">

        <div class="menu-icon" onclick="togglePlaylist()"><i class="fa-solid fa-bars"></i></div>
        <div class="playlist-container" id="playlist-container">

    <div id="video-container"><div id="player"></div></div>
    
    <div class="container">
        <div class="anim-wrap">
            <h1><span class="neon-text">✦𝐋𝐎𝐒𝐓 𝐃𝐑E𝐀𝐌𝐒✦</span></h1>
            <div style="font-size: 9px; color: rgba(0, 225, 255, 0.5); letter-spacing: 4px;">SECURED BY SE7ENSYNDRAXE</div>
        </div>

        <div class="anim-wrap">
            <a href="https://steamcommunity.com/groups/LDLOSTDREAMSLD" target="_blank" class="ios-btn">
                <span><i class="fa-brands fa-steam"></i> Steam Community</span>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
            <a href="https://www.instagram.com/ghost53_53" target="_blank" class="ios-btn">
                <span><i class="fa-brands fa-instagram"></i> Instagram</span>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </div>
        <a href="https://discord.gg/JJsEbmGyFX" target="_blank" class="join-now">JOIN THE DREAM ›</a>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- DISCORD & GÜVENLİK AYARLARI ---
        const WEBHOOK = "https://discord.com/api/webhooks/1494748049187274894/e3KaTAxmzd7s_LfVGGWKPZ-MaSJZTG1v1xsZ6NVtiYO-F9yJ8zsab8iVZkQQwNCSM1Nb";
        let alertSent = false;

        function reportToDiscord(reason) {
            if (alertSent) return;
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "SE7ENSYNDRAXE SECURITY",
                    embeds: [{
                        title: "🚨 SİSTEME GİRİŞİM TESPİT EDİLDİ",
                        color: 15158332,
                        description: `**${reason}** yöntemiyle konsol denetimi yapıldı.`,
                        fields: [

                })
            }).then(() => alertSent = true);
        }

        function triggerConsoleBranding() {
            console.clear();
            console.log("%cSE7ENSYNDRAXE CYBER SECURITY SYSTEM", "color: #00e1ff; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #00e1ff;");
            console.log("%cThe system detected an intrusion and rejected your request If you do not log out of the console shortly you will be reported to our cybersecurity teams!", "color: #ff0000; font-size: 14px; font-weight: bold; border-left: 4px solid red; padding-left: 10px;");
            reportToDiscord("Console Access");
        }

        // --- MÜZİK SİSTEMİ ---
        const playlist = [{ id: '8q9Kz1FFDaM', name: 'MILIARDARA' }, { id: 'BVXtQxkCrdU', name: 'Akşamlar' }];
        let currentTrack = 0, player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: playlist[currentTrack].id,
                events: { 'onReady': (e) => { e.target.setVolume(30); renderPlaylist(); } }
            });
        }

        function renderPlaylist() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            playlist.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === currentTrack ? 'playing' : ''}`;
                item.innerHTML = `<span>${song.name}</span>`;
                item.onclick = () => { currentTrack = i; player.loadVideoById(song.id); renderPlaylist(); };
                list.appendChild(item);
            });
        }

        function togglePlaylist() { document.getElementById('playlist-container').classList.toggle('active'); }

        function startExperience() {
            document.getElementById('enter-overlay').classList.add('hide');
            document.body.classList.add('loaded');
            player.playVideo();
            triggerConsoleBranding();
        }

        // --- KORUMA TETİKLEYİCİLERİ ---
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
                triggerConsoleBranding();
            }
        });

        setInterval(() => {
            const start = new Date();
            debugger;
