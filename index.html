<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Dreams | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.12);
            --cyan-glow: rgba(0, 212, 255, 0.35);
            --white: #ffffff;
            --dark: #04080f;
            --dark2: #080e1a;
            --gold: #c9a84c;
        }

        /* ── THEMES ── */
        body.theme-dark {
            --bg:        #000000;
            --bg2:       #000000;
            --surface:   rgba(8, 16, 28, 0.65);
            --surface2:  rgba(255,255,255,0.04);
            --border:    rgba(0, 212, 255, 0.13);
            --border2:   rgba(255,255,255,0.06);
            --text:      #f0f4ff;
            --text-dim:  rgba(240,244,255,0.38);
            --text-sub:  rgba(240,244,255,0.22);
            --accent:    #00d4ff;
            --accent2:   #0099cc;
            --particle:  rgba(0,212,255,0.55);
            --mesh1:     rgba(0, 80, 140, 0.18);
            --mesh2:     rgba(0, 30, 60, 0.25);
            --mesh3:     rgba(0, 160, 220, 0.06);
            --orb1:      rgba(0, 140, 200, 0.12);
            --orb2:      rgba(0, 60, 100, 0.20);
            --btn-glass: rgba(6, 14, 26, 0.72);
            --btn-shine: rgba(255,255,255,0.055);
            --btn-hover: rgba(0, 212, 255, 0.08);
            --shadow:    rgba(0,0,0,0.65);
            --join-text: var(--accent);
            --scanline:  rgba(0,0,0,0.035);
            --corner:    rgba(0,212,255,0.25);
        }

        body.theme-light {
            --bg:        #eef2f7;
            --bg2:       #e4eaf2;
            --surface:   rgba(255, 255, 255, 0.60);
            --surface2:  rgba(255,255,255,0.80);
            --border:    rgba(100,160,220,0.20);
            --border2:   rgba(100,160,220,0.12);
            --text:      #0d1b2a;
            --text-dim:  rgba(13,27,42,0.50);
            --text-sub:  rgba(13,27,42,0.32);
            --accent:    #006a9c;
            --accent2:   #0085c2;
            --particle:  rgba(0,100,180,0.35);
            --mesh1:     rgba(120,190,255,0.22);
            --mesh2:     rgba(180,220,255,0.18);
            --mesh3:     rgba(0,140,220,0.08);
            --orb1:      rgba(100,180,255,0.18);
            --orb2:      rgba(160,210,255,0.25);
            --btn-glass: rgba(255,255,255,0.68);
            --btn-shine: rgba(255,255,255,0.85);
            --btn-hover: rgba(0,100,180,0.07);
            --shadow:    rgba(60,90,140,0.18);
            --join-text: var(--accent);
            --scanline:  rgba(0,0,0,0.012);
            --corner:    rgba(0,120,200,0.22);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Jost', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background 0.7s ease, color 0.7s ease;
        }

        /* ── BAN SCREEN ── */
        #ban-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 999999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; font-family: monospace;
        }

        /* ── ENTER OVERLAY ── */
        #enter-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg);
            z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
            transition: opacity 1.4s cubic-bezier(0.4,0,0.2,1), visibility 1.4s;
            overflow: hidden;
        }
        #enter-overlay::before {
            content:'';
            position:absolute; inset:0;
            background: radial-gradient(ellipse 70% 50% at 50% 55%, var(--orb1) 0%, transparent 70%);
        }
        #enter-overlay.hide { opacity:0; visibility:hidden; pointer-events:none; }

        .enter-content {
            display:flex; flex-direction:column; align-items:center; gap:44px;
            position:relative; z-index:2;
        }

        .enter-emblem {
            position: relative;
            width: 140px; height: 140px;
        }
        .enter-ring {
            position:absolute; inset:0;
            border-radius:50%;
            border: 1px solid var(--border);
            animation: rotateRing 18s linear infinite;
        }
        .enter-ring:nth-child(2) {
            inset: 14px;
            border-color: rgba(0,212,255,0.08);
            animation-duration: 12s;
            animation-direction: reverse;
        }
        .enter-ring:nth-child(3) {
            inset: 28px;
            border-color: rgba(0,212,255,0.05);
            animation-duration: 25s;
        }
        .enter-inner {
            position:absolute; inset:42px;
            border-radius:50%;
            background: var(--orb1);
            backdrop-filter: blur(10px);
            display:flex; align-items:center; justify-content:center;
            border: 1px solid var(--border);
        }
        .enter-inner i { font-size:20px; color:var(--accent); }
        @keyframes rotateRing { to { transform: rotate(360deg); } }

        .enter-words { text-align:center; display:flex; flex-direction:column; gap:10px; }
        .enter-title {
            font-family:'Syncopate', sans-serif;
            font-size:11px; letter-spacing:10px;
            color:var(--text-dim); text-transform:uppercase;
        }
        .enter-cta {
            font-family:'Jost', sans-serif;
            font-size:9px; letter-spacing:7px;
            color:var(--accent); text-transform:uppercase;
            font-weight:400;
            animation: breathe 3s ease infinite;
        }
        @keyframes breathe { 0%,100% { opacity:0.25; } 50% { opacity:1; } }

        /* ── THEME TOGGLE ── */
        #theme-toggle {
            position: fixed; top: 28px; right: 32px; z-index: 600;
            opacity: 0; transform: translateY(-20px);
            transition: opacity 1s ease 0.8s, transform 1s ease 0.8s;
        }
        body.loaded #theme-toggle { opacity: 1; transform: translateY(0); }

        .theme-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: 0.3s cubic-bezier(0.34,1.2,0.64,1);
            box-shadow: 0 4px 20px var(--shadow);
        }
        .theme-pill:hover {
            transform: scale(1.04);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0,212,255,0.12), 0 4px 20px var(--shadow);
        }
        .theme-pill-dot {
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .theme-pill-dot i { font-size: 8px; color: var(--bg); }
        .theme-pill-label {
            font-size: 9px; letter-spacing: 4px; font-weight: 500;
            color: var(--text-dim); text-transform: uppercase;
        }

        /* ── BACKGROUND ── */
        #bg-canvas {
            position:fixed; top:0; left:0; width:100%; height:100%;
            z-index:1; pointer-events:none;
            transition: opacity 0.7s ease;
        }

        .bg-mesh {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            transition: 0.7s ease;
        }
        body.theme-dark .bg-mesh {
            background:
                radial-gradient(ellipse 55% 45% at 0% 0%, rgba(0,80,255,0.22) 0%, rgba(0,40,180,0.10) 40%, transparent 70%),
                radial-gradient(ellipse 55% 45% at 100% 100%, rgba(0,80,255,0.22) 0%, rgba(0,40,180,0.10) 40%, transparent 70%);
        }
        body.theme-light .bg-mesh {
            background:
                radial-gradient(ellipse 55% 45% at 0% 0%, rgba(0,80,255,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 55% 45% at 100% 100%, rgba(0,80,255,0.15) 0%, transparent 70%);
        }

        .scanlines {
            position:fixed; inset:0; z-index:3; pointer-events:none;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                var(--scanline) 2px, var(--scanline) 4px
            );
            transition: 0.7s;
        }

        .grid-overlay {
            position:fixed; inset:0; z-index:2; pointer-events:none;
            background-image:
                linear-gradient(var(--border2) 1px, transparent 1px),
                linear-gradient(90deg, var(--border2) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 30%, transparent 100%);
            transition: 0.7s;
        }

        /* ── CORNERS ── */
        .corner {
            position:fixed; width:44px; height:44px;
            pointer-events:none; z-index:5;
            transition: border-color 0.7s;
        }
        .corner-tl { top:18px; left:18px; border-top:1px solid var(--corner); border-left:1px solid var(--corner); }
        .corner-tr { top:18px; right:18px; border-top:1px solid var(--corner); border-right:1px solid var(--corner); }
        .corner-bl { bottom:18px; left:18px; border-bottom:1px solid var(--corner); border-left:1px solid var(--corner); }
        .corner-br { bottom:18px; right:18px; border-bottom:1px solid var(--corner); border-right:1px solid var(--corner); }

        /* ── MUSIC PANEL ── */
        .music-wrapper {
            position:fixed; top:28px; left:28px; z-index:500;
            opacity:0; transform:translateX(-30px);
            transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
            display:flex; flex-direction:column; gap:8px;
        }
        body.loaded .music-wrapper { opacity:1; transform:translateX(0); }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px var(--shadow), inset 0 1px 0 var(--btn-shine);
            transition: background 0.6s, border-color 0.6s, box-shadow 0.6s;
        }

        .vol-panel {
            padding: 11px 16px;
            border-radius: 18px;
            display:flex; align-items:center; gap:12px;
        }

        #vol-icon {
            color:var(--accent); font-size:14px; width:16px;
            cursor:pointer; transition:0.2s; text-align:center; flex-shrink:0;
        }
        #vol-icon:hover { transform:scale(1.2); filter: drop-shadow(0 0 6px var(--accent)); }

        .vol-slider {
            width:82px; height:2px;
            -webkit-appearance:none; appearance:none;
            background: var(--border2);
            border-radius:10px; cursor:pointer; outline:none;
            transition: background 0.6s;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:11px; height:11px; border-radius:50%;
            background:var(--accent);
            cursor:pointer;
            box-shadow: 0 0 8px var(--accent);
        }

        .menu-icon-btn {
            width:44px; height:44px; border-radius:16px;
            display:flex; justify-content:center; align-items:center;
            cursor:pointer; transition:0.3s;
            color:var(--accent); font-size:14px;
        }
        .menu-icon-btn:hover {
            background: var(--btn-hover);
            transform:scale(1.08);
        }

        /* Playlist */
        .playlist-panel {
            position:absolute; top:112px; left:0;
            width:270px; padding:16px;
            border-radius:22px;
            display:none; flex-direction:column; gap:6px;
        }
        .playlist-panel.active { display:flex; animation: dropIn 0.35s cubic-bezier(0.34,1.1,0.64,1) forwards; }
        @keyframes dropIn {
            from { opacity:0; transform:translateY(-12px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        .ctrl-row {
            display:flex; align-items:center; justify-content:center; gap:28px;
            padding-bottom:12px;
            border-bottom: 1px solid var(--border);
            margin-bottom:4px;
        }
        .ctrl-row i {
            cursor:pointer; color:var(--text-dim); font-size:16px; transition:0.2s;
        }
        .ctrl-row i:hover { color:var(--accent); transform:scale(1.3); }

        .song-item {
            display:flex; align-items:center; gap:10px;
            padding:8px 10px; border-radius:12px;
            cursor:pointer; transition:0.25s;
            border: 1px solid transparent;
        }
        .song-item:hover { background:var(--btn-hover); transform:translateX(3px); }
        .song-item.playing {
            background: var(--btn-hover);
            border-color: var(--border);
        }
        .song-thumb { width:36px; height:36px; border-radius:8px; object-fit:cover; flex-shrink:0; }
        .song-info { font-size:11px; font-weight:400; color:var(--text); letter-spacing:0.4px; line-height:1.3; }
        .song-playing-dot {
            width:5px; height:5px; border-radius:50%;
            background:var(--accent); margin-left:auto; flex-shrink:0;
            box-shadow: 0 0 6px var(--accent);
            animation: dotBlink 1.2s ease infinite;
        }
        @keyframes dotBlink { 0%,100%{opacity:0.3} 50%{opacity:1} }

        /* ── HUD ── */
        #music-hud {
            position:fixed; top:50%; left:50%;
            transform:translate(-50%,-50%);
            background:var(--surface);
            border:1px solid var(--border);
            padding:24px 52px; border-radius:20px;
            z-index:10000; text-align:center;
            pointer-events:none; opacity:0; transition:0.4s;
            backdrop-filter:blur(30px);
            box-shadow:0 0 50px var(--shadow);
        }
        #music-hud.show { opacity:1; transform:translate(-50%,-62%); }
        #music-hud i { font-size:34px; margin-bottom:10px; display:block; color:var(--accent); }
        #music-hud span { font-size:11px; font-weight:400; letter-spacing:4px; text-transform:uppercase; color:var(--text-dim); }

        /* ── MAIN ── */
        .container {
            text-align:center; z-index:10;
            width:100%; max-width:500px; padding:28px;
            position:relative;
        }

        /* ── DECO ── */
        .deco-line {
            display:flex; align-items:center; gap:14px;
            margin-bottom:40px; opacity:0;
        }
        body.loaded .deco-line { animation: fadeUp 1s ease 0.2s forwards; }
        .deco-line::before, .deco-line::after {
            content:''; flex:1; height:1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .deco-gem {
            width:5px; height:5px;
            background:var(--accent); transform:rotate(45deg);
            box-shadow: 0 0 10px var(--accent);
            transition: background 0.6s, box-shadow 0.6s;
        }

        /* ── TITLE ── */
        .title-block { opacity:0; }
        body.loaded .title-block { animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.05s forwards; }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .eyebrow {
            font-family:'Jost', sans-serif;
            font-size:8px; letter-spacing:9px; font-weight:400;
            color:var(--accent); text-transform:uppercase; margin-bottom:16px;
            transition: color 0.6s;
        }

        h1 {
            font-family:'Cormorant Garamond', serif;
            font-size:38px; font-weight:300;
            letter-spacing:5px; text-transform:uppercase;
            line-height:1; white-space:nowrap;
            color:var(--text);
            position:relative;
            transition: color 0.6s;
        }

        @keyframes lostDreamsShimmer {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lost-dreams-animated {
            background: linear-gradient(
                90deg,
                #ffffff 0%,
                #a0d8ff 15%,
                #0080ff 30%,
                #00cfff 45%,
                #ffffff 55%,
                #00cfff 70%,
                #0050ff 82%,
                #c0e8ff 92%,
                #ffffff 100%
            );
            background-size: 250% 250%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: lostDreamsShimmer 3.5s ease infinite;
            filter: drop-shadow(0 0 18px rgba(0,180,255,0.45));
        }

        body.theme-light .lost-dreams-animated {
            background: linear-gradient(
                90deg,
                #0a1a2e 0%,
                #0050cc 20%,
                #0080ff 40%,
                #003a99 60%,
                #0060dd 80%,
                #0a1a2e 100%
            );
            background-size: 250% 250%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: lostDreamsShimmer 3.5s ease infinite;
        }

        .title-em {
            font-style:italic; font-weight:300;
            letter-spacing:4px;
        }

        .byline {
            margin-top:12px;
            font-size:8px; letter-spacing:5px; font-weight:300;
            color:var(--text-sub); text-transform:uppercase;
            transition: color 0.6s;
        }
        .byline em { color:var(--accent); font-style:normal; }

        /* ── LIQUID GLASS BUTTONS ── */
        .buttons-block {
            margin:42px 0 0;
            display:flex; flex-direction:column; gap:10px;
            opacity:0;
        }
        body.loaded .buttons-block { animation: fadeUp 1s ease 0.3s forwards; }

        .liq-btn {
            display:flex; align-items:center; justify-content:space-between;
            padding:16px 20px;
            background: var(--btn-glass);
            border: 1px solid var(--border2);
            backdrop-filter: blur(30px) saturate(1.8);
            -webkit-backdrop-filter: blur(30px) saturate(1.8);
            text-decoration:none; color:var(--text);
            border-radius:22px;
            transition: 0.45s cubic-bezier(0.34,1.15,0.64,1);
            position:relative; overflow:hidden;
            box-shadow:
                0 2px 0 inset var(--btn-shine),
                0 -1px 0 inset rgba(0,0,0,0.08),
                0 8px 24px var(--shadow);
        }

        .liq-btn::before {
            content:'';
            position:absolute; top:-50%; left:-60%;
            width:50%; height:200%;
            background: linear-gradient(
                105deg,
                transparent 30%,
                rgba(255,255,255,0.07) 50%,
                transparent 70%
            );
            transition: left 0.7s ease;
            pointer-events:none;
        }

        .liq-btn::after {
            content:'';
            position:absolute; top:0; left:12px; right:12px; height:1px;
            background: linear-gradient(90deg, transparent, var(--btn-shine), transparent);
            border-radius:0 0 50% 50%;
        }

        .liq-btn:hover {
            border-color: var(--border);
            transform: translateY(-5px) scale(1.012);
            box-shadow:
                0 2px 0 inset var(--btn-shine),
                0 -1px 0 inset rgba(0,0,0,0.06),
                0 20px 50px var(--shadow),
                0 0 0 1px var(--border);
            background: color-mix(in srgb, var(--btn-glass) 90%, var(--accent) 10%);
        }
        .liq-btn:hover::before { left:120%; }
        .liq-btn:active { transform:translateY(-2px) scale(0.995); }

        .btn-left { display:flex; align-items:center; gap:16px; }

        .btn-icon {
            width:42px; height:42px; border-radius:14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            transition:0.35s; flex-shrink:0;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .liq-btn:hover .btn-icon {
            background:var(--btn-hover);
            border-color:var(--accent);
            box-shadow: 0 0 14px var(--cyan-dim), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-icon i { font-size:18px; color:var(--accent); transition:0.3s; }
        .liq-btn:hover .btn-icon i { transform:scale(1.1); }

        .btn-texts { text-align:left; }
        .btn-label { font-size:13px; font-weight:500; letter-spacing:0.8px; color:var(--text); display:block; transition:color 0.6s; }
        .btn-sub   { font-size:9px; letter-spacing:2.5px; color:var(--text-sub); font-weight:300; transition:color 0.6s; }

        .btn-arrow { color:var(--text-sub); font-size:10px; transition:0.3s; }
        .liq-btn:hover .btn-arrow { color:var(--accent); transform:translateX(3px); }

        /* ── JOIN BUTTON ── */
        .join-block {
            margin-top:34px; opacity:0;
        }
        body.loaded .join-block { animation: fadeUp 1s ease 0.5s forwards; }

        .join-btn {
            display: inline-block;
            padding: 18px 58px;
            background: transparent;
            border: 1px solid rgba(0,212,255,0.35);
            color: #00d4ff;
            text-decoration: none;
            border-radius: 100px;
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: none;
            position: relative;
            overflow: hidden;
            transition: letter-spacing 0.5s cubic-bezier(0.34,1.15,0.64,1),
                        transform 0.5s cubic-bezier(0.34,1.15,0.64,1),
                        border-color 0.4s ease,
                        box-shadow 0.4s ease,
                        color 0.4s ease;
            backdrop-filter: blur(16px);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.06),
                0 4px 24px rgba(0,0,0,0.4),
                0 0 0px rgba(0,212,255,0);
            z-index: 0;
        }

        /* animated border glow sweep */
        .join-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 100px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 60%,
                rgba(0,212,255,0.9) 75%,
                rgba(255,255,255,0.95) 80%,
                rgba(0,212,255,0.9) 85%,
                transparent 100%
            );
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            animation: rotateBorder 2.2s linear infinite paused;
        }

        /* inner fill layer */
        .join-btn::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 100px;
            background: rgba(0,0,0,0.85);
            z-index: -1;
            transition: background 0.4s ease;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotateBorder {
            to { --angle: 360deg; }
        }

        @keyframes joinPulse {
            0%, 100% { box-shadow: 0 0 18px rgba(0,212,255,0.25), 0 0 40px rgba(0,212,255,0.1), 0 8px 32px rgba(0,0,0,0.5); }
            50%       { box-shadow: 0 0 32px rgba(0,212,255,0.5), 0 0 70px rgba(0,212,255,0.2), 0 8px 32px rgba(0,0,0,0.5); }
        }

        /* particles inside btn */
        .join-btn .btn-particles {
            position: absolute; inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 100px;
        }
        .join-btn .btn-particles span {
            position: absolute;
            bottom: -10px;
            width: 3px; height: 3px;
            border-radius: 50%;
            background: rgba(0,212,255,0.8);
            opacity: 0;
            animation: riseParticle 1.6s ease-in infinite;
            animation-play-state: paused;
        }
        .join-btn .btn-particles span:nth-child(1)  { left: 15%; animation-delay: 0s;    width:2px; height:2px; }
        .join-btn .btn-particles span:nth-child(2)  { left: 30%; animation-delay: 0.3s;  width:3px; height:3px; }
        .join-btn .btn-particles span:nth-child(3)  { left: 50%; animation-delay: 0.6s;  width:2px; height:2px; }
        .join-btn .btn-particles span:nth-child(4)  { left: 68%; animation-delay: 0.15s; width:3px; height:3px; }
        .join-btn .btn-particles span:nth-child(5)  { left: 82%; animation-delay: 0.45s; width:2px; height:2px; }
        .join-btn .btn-particles span:nth-child(6)  { left: 40%; animation-delay: 0.75s; width:2px; height:2px; }

        @keyframes riseParticle {
            0%   { transform: translateY(0) scale(1);   opacity: 0; }
            20%  { opacity: 0.9; }
            80%  { opacity: 0.4; }
            100% { transform: translateY(-48px) scale(0.3); opacity: 0; }
        }

        /* shimmer text sweep */
        .join-btn .btn-text {
            position: relative;
            background: linear-gradient(90deg,
                #00d4ff 0%, #ffffff 40%, #00d4ff 55%, #7eeeff 70%, #00d4ff 100%
            );
            background-size: 220% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-position: 100% center;
            transition: background-position 0.6s ease;
        }

        .join-btn:hover {
            border-color: transparent;
            transform: translateY(-6px) scale(1.045) rotateX(6deg);
            letter-spacing: 9px;
            color: #fff;
            animation: joinPulse 1.6s ease infinite;
        }
        .join-btn:hover::before {
            opacity: 1;
            animation-play-state: running;
        }
        .join-btn:hover::after {
            background: rgba(0,8,20,0.9);
        }
        .join-btn:hover .btn-particles span {
            animation-play-state: running;
        }
        .join-btn:hover .btn-text {
            background-position: 0% center;
        }
        .join-btn:active {
            transform: translateY(-2px) scale(0.98);
            animation: none;
        }

        .founders {
            margin-top:22px;
            font-size:8px; letter-spacing:3px; color:var(--text-sub);
            text-transform:uppercase; font-weight:300;
            line-height:2;
            transition: color 0.6s;
        }
        .founders .f1 { color:var(--text-dim); }
        .founders .f2 { color:var(--accent); }

        #video-container { position:absolute; left:-9999px; visibility:hidden; }

        .noise {
            position:fixed; inset:0; z-index:4; pointer-events:none; opacity:0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* ── PROFILE LOGO ── */
        .profile-logo {
            width: 72px; height: 72px;
            border-radius: 50%;
            border: 1px solid var(--border);
            box-shadow: 0 0 18px var(--cyan-glow), 0 0 40px rgba(0,212,255,0.1);
            background: rgba(0,212,255,0.06);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px auto;
            overflow: hidden;
            backdrop-filter: blur(10px);
            opacity: 0;
        }
        body.loaded .profile-logo { animation: fadeUp 1s ease 0.0s forwards; }
        .profile-logo img { width: 78%; height: 78%; object-fit: contain; filter: brightness(1.1); }

        /* ── CUSTOM CURSOR ── */
        * { cursor: none !important; }

        #cursor-dot {
            position: fixed; top: 0; left: 0;
            width: 8px; height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease, background 0.2s;
            box-shadow: 0 0 10px #00d4ff, 0 0 20px rgba(0,212,255,0.5);
        }

        #cursor-ring {
            position: fixed; top: 0; left: 0;
            width: 32px; height: 32px;
            border: 1px solid rgba(0,212,255,0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999998;
            transform: translate(-50%, -50%);
            transition: transform 0.18s ease, width 0.2s ease, height 0.2s ease, border-color 0.2s;
        }

        #cursor-ring.hovering {
            width: 48px; height: 48px;
            border-color: rgba(0,212,255,1);
            box-shadow: 0 0 12px rgba(0,212,255,0.3);
        }

        /* ── 3D PERSPECTIVE ── */
        .container {
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .title-block, .deco-line, .buttons-block, .join-block {
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            will-change: transform;
        }

        .liq-btn {
            transform-style: preserve-3d;
        }
        .liq-btn:hover {
            transform: translateY(-5px) scale(1.012) rotateX(4deg);
        }

        .profile-logo {
            transform-style: preserve-3d;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .profile-logo:hover {
            transform: scale(1.08) rotateY(8deg) rotateX(-4deg);
            box-shadow: 0 0 30px var(--cyan-glow), 8px 8px 30px rgba(0,0,0,0.4);
        }

        .glass {
            transform-style: preserve-3d;
        }
    </style>
</head>

                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || gpu;
                }
                
                const systemReport = [
                    `**🛑 FULL SYSTEM EXPLOIT (CONSOLE DETECTED)**`,
                    `**🌐 Network:**`,
                    `> IP: \`${ipData.ip}\``,
                    `> Konum: \`${ipData.city} / ${ipData.region} / ${ipData.country_name}\``,
                    `> Sağlayıcı: \`${ipData.org}\``,
                    `**💻 Hardware:**`,
                    `> GPU: \`${gpu}\``,
                    `> Ekran: \`${window.screen.width}x${window.screen.height}\``,
                    `> Mantıksal Çekirdek: \`${navigator.hardwareConcurrency || 'Bilinmiyor'}\``,
                    `> Bellek (Tahmini): \`${navigator.deviceMemory || 'Bilinmiyor'} GB\``,
                    `**🛰️ Software:**`,
                    `> Browser: \`${navigator.userAgent}\``,
                    `> Platform: \`${navigator.platform}\``,
                    `> Dil: \`${navigator.language}\``,
                    `> Saat Dilimi: \`${Intl.DateTimeFormat().resolvedOptions().timeZone}\``
                ].join('\n');

                sendLog("🛑 KRİTİK SIZMA TESPİTİ", systemReport, 15158332);
            } catch (err) {
                sendLog("🚨 SIZMA TESPİT EDİLDİ", "Konsol açıldı fakat detaylı veri çekilemedi.", 15158332);
            }
        }

        window.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && [73,74,67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode === 85)) {
                if (!intrusionLogged) fullLeak();
            }
        });
        
        window.oncontextmenu = e => { e.preventDefault(); };
        
        setInterval(() => {
            const threshold = 160;
            if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
                if (!intrusionLogged) fullLeak();
            } else {
                intrusionLogged = false; // Konsol kapanırsa sıfırlar, bir sonraki açılışta tekrar loglar
            }
        }, 1000);

        // ── BUTON TIKLAMALARI ──
        document.getElementById('steam-btn').onclick = () => sendLog("🔗 Tıklandı: Steam", "Kullanıcı Steam sayfasına yönleniyor.");
        document.getElementById('insta-btn').onclick = () => sendLog("🔗 Tıklandı: Instagram", "Kullanıcı Instagram sayfasına yönleniyor.");
        document.getElementById('discord-btn').onclick = () => sendLog("🔗 Tıklandı: Discord", "Kullanıcı Discord davetine basıyor.");

        async function checkIpBan() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const userIp = data.ip;
                if (BANNED_IPS.includes(userIp)) {
                    document.getElementById('ban-screen').style.display = 'flex';
                    document.getElementById('ban-id-display').innerText = "REF_ID: " + btoa(userIp);
                    return true;
                }
                return false;
            } catch(e) { return false; }
        }

        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('theme-dark', isDark);
            document.body.classList.toggle('theme-light', !isDark);
            const icon = document.getElementById('theme-icon');
            const label = document.getElementById('theme-label');
            icon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            label.textContent = isDark ? 'Dark' : 'Light';
            sendLog("🎨 Tema Değişimi", `Yeni tema: ${isDark ? "Koyu" : "Açık"}`);
        }

        const playlist = [
            { id:'8q9Kz1FFDaM', name:'MILIARDARA' },
            { id:'BVXtQxkCrdU', name:'Rauf Faik – Akşamlar' },
            { id:'64afHun2_B0', name:'J-Killz – Honey' },
            { id:'PcEiHPlf894', name:'Lipstick (Sped Up)' }
        ];
        let currentTrack = 0, player, hudTimeout, previousVolume = 30, isMuted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height:'1', width:'1',
                videoId: playlist[currentTrack].id,
                playerVars:{ autoplay:0, controls:0, disablekb:1, rel:0 },
                events:{
                    onReady: e => { e.target.setVolume(30); renderPlaylist(); },
                    onStateChange: e => { if (e.data === YT.PlayerState.ENDED) nextTrack(); }
                }
            });
        }

        function getVolumeIcon(val) {
            if (val === 0) return "fa-solid fa-volume-xmark";
            if (val < 33) return "fa-solid fa-volume-off";
            if (val < 66) return "fa-solid fa-volume-low";
            return "fa-solid fa-volume-high";
        }

        function showHUD(text, iconClass) {
            const hud = document.getElementById('music-hud');
            clearTimeout(hudTimeout);
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = iconClass;
            hud.classList.add('show');
            hudTimeout = setTimeout(() => hud.classList.remove('show'), 2800);
        }

        function toggleMute() {
            const slider = document.getElementById('vol-slider');
            const volIcon = document.getElementById('vol-icon');
            if (isMuted) {
                isMuted = false;
                let v = previousVolume > 0 ? previousVolume : 30;
                player.setVolume(v); slider.value = v;
                let ic = getVolumeIcon(v); volIcon.className = ic;
                showHUD(`Volume: %${v}`, ic);
                sendLog("🔊 Ses Açıldı", `Ses seviyesi: %${v}`);
            } else {
                previousVolume = player.getVolume(); isMuted = true;
                player.setVolume(0); slider.value = 0;
                volIcon.className = "fa-solid fa-volume-xmark";
                showHUD("Muted", "fa-solid fa-volume-xmark");
                sendLog("🔇 Ses Kısıldı", "Kullanıcı sesi tamamen kapattı.");
            }
        }

        function playTrack(index) {
            currentTrack = index;
            player.loadVideoById(playlist[currentTrack].id);
            renderPlaylist();
            showHUD(`▶  ${playlist[currentTrack].name}`, "fa-solid fa-music");
            sendLog("🎵 Müzik Değişti", `Şu an çalan: **${playlist[index].name}**`);
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo(); btn.className = "fa-solid fa-play";
                showHUD("Paused", "fa-solid fa-pause");
                sendLog("⏸ Müzik Durduruldu", "Kullanıcı oynatıcıyı duraklattı.");
            } else {
                player.playVideo(); btn.className = "fa-solid fa-pause";
                showHUD("Playing", "fa-solid fa-play");
                sendLog("▶ Müzik Başlatıldı", "Kullanıcı oynatıcıyı başlattı.");
            }
        }

        function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; playTrack(currentTrack); }
        function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; playTrack(currentTrack); }

        document.getElementById('vol-slider').addEventListener('input', e => {
            let val = parseInt(e.target.value);
            if(player && typeof player.setVolume === 'function') player.setVolume(val);
            
            let ic = getVolumeIcon(val);
            document.getElementById('vol-icon').className = ic;
            
            if (val === 0) { 
                isMuted = true; 
                showHUD("Muted", ic); 
            } else { 
                isMuted = false; 
                previousVolume = val; 
                showHUD(`Volume: %${val}`, ic); 
            }
        });

        document.getElementById('vol-slider').addEventListener('change', e => {
            sendLog("🎚 Ses Ayarı", `Yeni ses seviyesi: %${e.target.value}`);
        });

        function renderPlaylist() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            playlist.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = "song-item" + (i === currentTrack ? ' playing' : '');
                item.innerHTML = `
                    <img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg" class="song-thumb">
                    <div class="song-info">${song.name}</div>
                    ${i === currentTrack ? '<div class="song-playing-dot"></div>' : ''}
                `;
                item.onclick = () => playTrack(i);
                list.appendChild(item);
            });
        }

        function togglePlaylist() {
            document.getElementById('playlist-container').classList.toggle('active');
            sendLog("📂 Liste Açıldı/Kapandı", "Kullanıcı çalma listesi menüsünü tetikledi.");
        }

        async function startExperience() {
            const isBanned = await checkIpBan();
            if (isBanned) return;
            document.getElementById('enter-overlay').classList.add('hide');
            document.body.classList.add('loaded');
            player.playVideo();
            sendDetailedLog("🌟 SİTEYE GİRİŞ YAPILDI");
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [], mouse = { x: -999, y: -999 };
        let shootingStars = [];

        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function spawnShootingStar() {
            const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
            const speed = 2.5 + Math.random() * 3;
            shootingStars.push({
                x: Math.random() * canvas.width * 1.2 - canvas.width * 0.1,
                y: Math.random() * canvas.height * 0.5 - 50,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: 1.2 + Math.random() * 1.8,
                trail: [],
                maxTrail: 18 + Math.floor(Math.random() * 22),
                opacity: 0,
                done: false
            });
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            const count = Math.min(70, Math.floor(window.innerWidth / 18));
            for (let i = 0; i < count; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: (Math.random() - 0.5) * 0.25,
                    size: Math.random() * 1.1 + 0.3,
                    opacity: Math.random() * 0.35 + 0.08
                });
            }
            shootingStars = [];
            for (let i = 0; i < 12; i++) {
                setTimeout(spawnShootingStar, Math.random() * 4000);
            }
        }

        function getParticleColor() {
            return document.body.classList.contains('theme-light') ? `rgba(0,100,180,` : `rgba(0,212,255,`;
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const pColor = getParticleColor();

            // Shooting stars
            shootingStars.forEach((s, si) => {
                if (s.done) return;
                s.opacity = Math.min(1, s.opacity + 0.08);
                s.x += s.vx;
                s.y += s.vy;
                s.trail.push({ x: s.x, y: s.y });
                if (s.trail.length > s.maxTrail) s.trail.shift();

                if (s.x > canvas.width + 100 || s.y > canvas.height + 100) {
                    s.done = true;
                    setTimeout(spawnShootingStar, 300 + Math.random() * 1200);
                    return;
                }

                // Draw trail
                for (let ti = 0; ti < s.trail.length - 1; ti++) {
                    const progress = ti / s.trail.length;
                    const alpha = progress * 0.9 * s.opacity;
                    const tp = s.trail[ti];
                    const tn = s.trail[ti + 1];
                    ctx.beginPath();
                    ctx.moveTo(tp.x, tp.y);
                    ctx.lineTo(tn.x, tn.y);
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.lineWidth = s.size * progress * 0.8;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Star head
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                ctx.shadowColor = 'rgba(200,230,255,0.9)';
                ctx.shadowBlur = 6;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            shootingStars = shootingStars.filter(s => !s.done);

            // Original dots
            dots.forEach((d, i) => {
                const mdx = mouse.x - d.x, mdy = mouse.y - d.y;
                const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                if (mdist < 120) { d.vx += mdx * 0.00006; d.vy += mdy * 0.00006; }
                d.vx *= 0.998; d.vy *= 0.998;
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fillStyle = pColor + d.opacity + ')';
                ctx.fill();
                for (let j = i + 1; j < dots.length; j++) {
                    const dx = dots[j].x - d.x, dy = dots[j].y - d.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 110) {
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(dots[j].x, dots[j].y);
                        ctx.strokeStyle = pColor + (0.07 * (1 - dist/110)) + ')';
                        ctx.lineWidth = 0.4;
                        ctx.stroke();
                    }
                }
            });

            requestAnimationFrame(drawCanvas);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawCanvas();
    </script>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <script>
        // Custom cursor
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let ringX = 0, ringY = 0, dotX = 0, dotY = 0;

        document.addEventListener('mousemove', e => {
            dotX = e.clientX; dotY = e.clientY;
            dot.style.left = dotX + 'px';
            dot.style.top = dotY + 'px';
        });

        function animateRing() {
            ringX += (dotX - ringX) * 0.12;
            ringY += (dotY - ringY) * 0.12;
            ring.style.left = ringX + 'px';
            ring.style.top = ringY + 'px';
            requestAnimationFrame(animateRing);
        }
        animateRing();

        document.querySelectorAll('a, button, .liq-btn, .join-btn, .menu-icon-btn, .theme-pill, .song-item, #vol-icon').forEach(el => {
            el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
            el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
        });

        // 3D tilt on container
        const container3d = document.querySelector('.container');
        document.addEventListener('mousemove', e => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;
            if (container3d) {
                container3d.style.transform = `perspective(1000px) rotateY(${dx * 5}deg) rotateX(${-dy * 4}deg)`;
            }
        });
        document.addEventListener('mouseleave', () => {
            if (container3d) container3d.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
        });
    </script>
