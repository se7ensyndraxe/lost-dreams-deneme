<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505; color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Giriş Ekranı */
        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #enter-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        #enter-overlay h2 { font-size: 10px; letter-spacing: 10px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; animation: neonLoader 2s infinite; text-align: center; padding-left: 10px; }
        @keyframes neonLoader { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Müzik Kontrol Paneli (Responsive) */
        .music-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-30px);
            z-index: 500; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 10px 15px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 12px; opacity: 0; transition: 1s ease;
        }
        /* PC'de sol üste çekiyoruz */
        @media (min-width: 769px) {
            .music-panel { left: 30px; transform: translateX(-30px); }
            body.loaded .music-panel { opacity: 1; transform: translateX(0); }
        }
        /* Mobilde ortada kalıyor */
        @media (max-width: 768px) {
            .music-panel { width: 90%; max-width: 320px; justify-content: center; top: 15px; }
            body.loaded .music-panel { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .music-controls { display: flex; gap: 15px; align-items: center; }
        .music-controls i { cursor: pointer; font-size: 16px; opacity: 0.7; }
        .vol-slider { width: 60px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; }

        /* HUD Bildirim */
        #music-hud {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 30px; border-radius: 15px; z-index: 1000;
            text-align: center; pointer-events: none; opacity: 0; transition: 0.4s;
            width: 80%; max-width: 300px;
        }
        #music-hud.show { opacity: 1; transform: translate(-50%, -60%); }
        #music-hud i { font-size: 30px; margin-bottom: 8px; display: block; }
        #music-hud span { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .container { text-align: center; z-index: 10; width: 90%; max-width: 440px; padding: 20px; transition: 0.5s; }

        /* Mobil Font Küçültme */
        h1 { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; }
        @media (min-width: 769px) { h1 { font-size: 32px; letter-spacing: 6px; } }

        .lost-side, .dreams-side { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .neon-text { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }

        .designer-tag, .founder-tag { font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 2px; text-transform: uppercase; }
        @media (min-width: 769px) { .designer-tag, .founder-tag { font-size: 10px; letter-spacing: 4px; } }
        .designer-tag { margin-bottom: 30px; }

        .link-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .ios-btn { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 20px; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); 
            text-decoration: none; color: white; border-radius: 18px; transition: 0.3s;
        }
        .ios-btn b { font-size: 14px; }

        .join-now-wrap { margin-top: 35px; }
        .join-now { 
            padding: 15px 40px; background: linear-gradient(90deg, #000, #fff); 
            color: #000; text-decoration: none; border-radius: 100px; 
            font-weight: 900; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
        }

        #video-container { position: absolute; top: -1000px; left: -1000px; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const playlist = [
            { id: '8q9Kz1FFDaM', name: 'MILIARDARA' },
            { id: 'BVXtQxkCrdU', name: 'Rauf Faik - Akşamlar' },
            { id: '64afHun2_B0', name: 'J-Killz The Prince - Honey' },
            { id: 'PcEiHPlf894', name: 'Lipstick (Sped Up)' },
            { id: 'vTG4AvEnFLA', name: 'Desolate' }
        ];
        let currentTrack = 0;
        let player;
        let hudTimeout;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1',
                videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'playsinline': 1, 'rel': 0 },
                events: {
                    'onReady': (e) => e.target.setVolume(30),
                    'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) nextTrack(); }
                }
            });
        }

        function showHUD(text, iconClass) {
            const hud = document.getElementById('music-hud');
            clearTimeout(hudTimeout);
            document.getElementById('hud-text').innerText = text;
            document.getElementById('hud-icon').className = iconClass;
            hud.classList.add('show');
            hudTimeout = setTimeout(() => hud.classList.remove('show'), 2000);
        }

        function startExperience() {
            document.getElementById('enter-overlay').classList.add('hide');
            document.body.classList.add('loaded');
            document.getElementById('main-content').style.opacity = "1";
            document.getElementById('main-content').style.animation = "dropBounce 1.2s forwards";
            
            // Mobil için önemli: Kullanıcı etkileşimi anında müziği başlat
            if(player && player.playVideo) {
                player.playVideo();
                showHUD(playlist[currentTrack].name, "fa-solid fa-music");
            }
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (player.getPlayerState() === 1) {
                player.pauseVideo();
                btn.className = "fa-solid fa-play";
                showHUD("Durduruldu", "fa-solid fa-pause");
            } else {
                player.playVideo();
                btn.className = "fa-solid fa-pause";
                showHUD("Devam Ediyor", "fa-solid fa-play");
            }
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            player.loadVideoById(playlist[currentTrack].id);
            showHUD(playlist[currentTrack].name, "fa-solid fa-forward-step");
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            player.loadVideoById(playlist[currentTrack].id);
            showHUD(playlist[currentTrack].name, "fa-solid fa-backward-step");
        }

        document.getElementById('vol-slider').addEventListener('input', (e) => {
            player.setVolume(e.target.value);
            if(e.target.value == 0) showHUD("Sessiz", "fa-solid fa-volume-xmark");
        });

        // Arka Plan Animasyonu
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < (window.innerWidth < 768 ? 40 : 80); i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, size: Math.random() * 1.2 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 100) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); draw();
    </script>
